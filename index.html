                    <div className="grid grid-cols-2 gap-8 mb-6 text-sm">
                      <div>
                        <div className="mb-1 print:hidden relative">
                          <div onClick={() => setIsPartnerDropdownOpen(!isPartnerDropdownOpen)} className="cursor-pointer text-base font-bold uppercase hover:text-[#007AFF] inline-flex items-center gap-1 text-black">
                            {selectedPartner.id ? selectedPartner.name : `-- PILIH ${partnerLabel.toUpperCase()} --`} <ChevronDown size={14} />
                          </div>
                          {isPartnerDropdownOpen && (
                            <div className="absolute top-full left-0 mt-1 w-64 bg-white border border-gray-200 shadow-xl rounded-3xl z-50 overflow-hidden font-normal normal-case">
                              <div className="p-2 border-b border-gray-100 bg-gray-50">
                                <input autoFocus type="text" placeholder={`Cari ${partnerLabel}...`} className="w-full px-4 py-2 text-sm outline-none bg-white border border-gray-200 rounded-full focus:border-[#007AFF]" value={partnerSearch} onChange={(e)=>setPartnerSearch(e.target.value)} />
                              </div>
                              <div className="max-h-48 overflow-y-auto">
                                {partners.filter(s => s.name.toLowerCase().includes(partnerSearch.toLowerCase())).length === 0 ? (
                                  <div className="p-4 text-sm text-gray-500 text-center">{partnerLabel} tidak ditemukan</div>
                                ) : (
                                  partners.filter(s => s.name.toLowerCase().includes(partnerSearch.toLowerCase())).map(s => (
                                    <div key={s.id} className="p-4 hover:bg-blue-50 cursor-pointer text-sm border-b border-gray-50 last:border-0" onClick={() => { setPartnerId(s.id); setIsPartnerDropdownOpen(false); setPartnerSearch(''); }}>
                                      <div className="font-bold text-gray-800">{s.name}</div>
                                    </div>
                                  ))
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                        <div className="font-bold mb-1 hidden print:block uppercase text-base">{selectedPartner.name || `PILIH ${partnerLabel.toUpperCase()}`}</div>
                        <div className="text-gray-800 pr-12">{selectedPartner.address ? selectedPartner.address : <span className="print:hidden text-[#C7C7CC]">Alamat (opsional)</span>}</div>
                      </div>
                      <div>
                        <div className="font-bold mb-1 uppercase text-base">{settings.branchName || 'CABANG'}</div>
                        <div className="text-gray-800 pr-4">{settings.branchAddress}</div>
                      </div>
                    </div>

                    <div className="mb-2 flex-1">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="border-t-2 border-b border-black">
                            <th className="py-1 px-1 text-center font-bold w-10">NO</th>
                            <th className="py-1 px-2 text-left font-bold">DESKRIPSI ITEM</th>
                            <th className="py-1 px-2 text-center font-bold w-12">Qty</th>
                            <th className="py-1 px-2 text-center font-bold w-16">UNIT</th>
                            {appMode !== 'SJ' && <th className="py-1 px-2 text-right font-bold w-28">UNIT PRICE</th>}
                            {appMode !== 'SJ' && <th className="py-1 px-2 text-right font-bold w-32">SUB TOTAL</th>}
                            <th className="py-1 px-0 w-8 print:hidden"></th>
                          </tr>
                        </thead>
                        <tbody>
                          {items.map((item, index) => (
                            <tr key={item.id} className="group relative border-b border-gray-100 print:border-none">
                              <td className="py-1.5 px-1 text-center align-top">{index + 1}</td>
                              <td className="py-1 px-2 align-top"><input type="text" value={item.desc} onChange={(e) => handleItemChange(item.id, 'desc', e.target.value)} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none uppercase" placeholder="Masukkan deskripsi barang..." /></td>
                              <td className="py-1 px-2 align-top text-center"><input type="number" value={item.qty} onChange={(e) => handleItemChange(item.id, 'qty', Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none text-center" min="1" /></td>
                              <td className="py-1 px-2 align-top text-center"><input type="text" value={item.unit} onChange={(e) => handleItemChange(item.id, 'unit', e.target.value)} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none text-center uppercase" /></td>
                              
                              {appMode !== 'SJ' && (
                                  <td className="py-1 px-2 align-top text-right">
                                    <div className="flex flex-col items-end gap-1 print:hidden">
                                      <div className="flex items-center justify-end gap-1 w-full">
                                        <button onClick={() => openDiscountModal(item)} className="p-1 text-[#007AFF] hover:bg-[#E5F1FF] rounded-full transition-colors" title="Atur Diskon">%</button>
                                        <input type="number" value={item.price || ''} onChange={(e) => handleItemChange(item.id, 'price', Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 text-right" step="100" placeholder="0" />
                                      </div>
                                    </div>
                                    <div className="hidden print:block text-right">{formatCurrency(calculateNetPrice(item.price, item.discounts))}</div>
                                  </td>
                              )}
                              
                              {appMode !== 'SJ' && (
                                  <td className="py-1.5 px-2 align-top text-right font-medium">{formatCurrency(item.qty * calculateNetPrice(item.price, item.discounts))}</td>
                              )}

                              <td className="py-1 px-0 align-top text-center print:hidden"><button onClick={() => handleRemoveItem(item.id)} className="text-[#FF3B30] opacity-0 group-hover:opacity-100 transition-opacity p-1 hover:bg-[#FFE5E5] rounded-full" title="Hapus baris"><Trash2 size={16} /></button></td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot className="print:hidden">
                          <tr>
                            <td colSpan={appMode === 'SJ' ? "3" : "5"} className="pt-2"><button onClick={handleAddItem} className="w-[80%] text-xs flex items-center justify-center gap-1.5 text-[#007AFF] font-bold px-3 py-2.5 bg-[#F2F2F7] hover:bg-[#E5E5EA] rounded-full transition-colors"><Plus size={14} /> TAMBAH BARIS</button></td>
                            {appMode !== 'SJ' && <td className="pt-2 px-2 align-top text-right"><div className="border-t border-black pt-1"><span className="font-bold text-base tracking-wide">{formatCurrency(total)}</span></div></td>}
                            <td></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>

                    <div className="mt-auto pt-4 px-2 grid grid-cols-2 gap-8 items-end">
                      <div className={`w-full mb-2 ${!note.trim() ? 'print:hidden' : ''}`}>
                         <div className="font-bold text-sm mb-1">Catatan :</div>
                         <textarea className="w-full bg-transparent border-transparent outline-none resize-none text-sm p-3 hover:bg-gray-50 focus:bg-gray-50 focus:ring-1 focus:ring-blue-100 rounded-3xl transition-all print:resize-none print:p-0 print:border-none" rows="3" value={note} onChange={(e) => setNote(e.target.value)} placeholder="Tambahkan catatan khusus... (opsional)" />
                      </div>
                      <div className="flex flex-col items-end col-start-2">
                        {appMode !== 'SJ' && (
                            <div className="w-[140px] mb-6 hidden print:block">
                              <div className="border-t border-black pt-1 flex justify-end">
                                <span className="font-bold text-base tracking-wide">{formatCurrency(total)}</span>
                              </div>
                            </div>
                        )}
                        <div className="text-center w-48 relative pr-2">
                          <div className="h-16 mb-2"></div> 
                          <div className="border-t border-black"></div>
                          <div className="mt-1 text-sm font-bold flex items-center justify-center whitespace-nowrap">
                            <span>(</span>
                            <span className="relative inline-flex items-center justify-center">
                              <span className="invisible whitespace-pre min-w-[1px]">{currentSignature || ' '}</span>
                              {userRole === 'Boss' ? (
                                <input type="text" value={currentSignature} onChange={(e) => setSettings({...settings, [currentSignatureKey]: e.target.value})} onFocus={(e) => e.target.select()} className="absolute inset-0 w-full h-full bg-transparent border-none text-center outline-none p-0 m-0" />
                              ) : (
                                <div className="absolute inset-0 w-full h-full bg-transparent border-none text-center outline-none p-0 m-0">{currentSignature}</div>
                              )}
                            </span>
                            <span>)</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Discount Modal */}
                  {discountModalId && (
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 print:hidden p-4">
                      <div className="bg-white rounded-[2.5rem] shadow-xl w-auto min-w-[340px] overflow-hidden">
                        <div className="px-6 py-5 border-b border-[#F2F2F7] flex justify-between items-center bg-[#F9F9F9]">
                          <h3 className="font-bold text-[#1C1C1E]">Diskon Beruntun</h3>
                          <button onClick={() => setDiscountModalId(null)} className="text-[#8E8E93] hover:text-[#FF3B30] transition-colors"><XCircle size={20}/></button>
                        </div>
                        <div className="p-8">
                          <div className="flex flex-wrap items-center justify-center gap-2 mb-8 w-full">
                            {[0, 1, 2, 3].map((idx) => (
                              <React.Fragment key={idx}>
                                <div className="relative">
                                  <input type="number" value={tempDiscounts[idx]} onChange={(e) => handleDiscountChange(idx, e.target.value)} onFocus={(e) => e.target.select()} className="w-16 bg-[#F2F2F7] border-none rounded-full p-2 pr-4 text-center font-medium focus:ring-2 focus:ring-[#007AFF] outline-none" placeholder="0" />
                                  <span className="absolute right-2 top-2.5 text-[10px] text-[#8E8E93]">%</span>
                                </div>
                                {idx < 3 && <span className="text-[#8E8E93] font-bold">+</span>}
                              </React.Fragment>
                            ))}
                          </div>
                          <button onClick={saveDiscounts} className="w-full bg-[#007AFF] hover:bg-[#0056b3] text-white font-bold py-4 rounded-full transition-colors shadow-sm">Terapkan Diskon</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            }

            // --- 2. DOC LIST VIEW ---
            function DocListView({ appMode, docs, onLoadDoc, onUpdateStatus, userRole, settings }) {
              const formatCurrency = (num) => new Intl.NumberFormat('id-ID').format(num);
              const [expandedId, setExpandedId] = useState(null);
              const [searchTerm, setSearchTerm] = useState('');
              const [isExportModalOpen, setIsExportModalOpen] = useState(false);
              const [exportFilter, setExportFilter] = useState({ startDate: '', endDate: '', tax: 'Semua' });

              let docTitle = 'Purchase Order';
              let partnerLabel = 'Vendor';
              if (appMode === 'SJ') { docTitle = 'Surat Jalan'; partnerLabel = 'Customer'; }
              if (appMode === 'INV') { docTitle = 'Invoice'; partnerLabel = 'Customer'; }

              const toggleExpand = (id) => setExpandedId(expandedId === id ? null : id);
              const filteredDocs = docs.filter(doc => doc.poNumber.toLowerCase().includes(searchTerm.toLowerCase()) || doc.vendor.name.toLowerCase().includes(searchTerm.toLowerCase()));

              const handleExportExcel = () => {
                const exportedData = docs.filter(doc => {
                  const docDate = new Date(doc.date).setHours(0,0,0,0);
                  const start = exportFilter.startDate ? new Date(exportFilter.startDate).setHours(0,0,0,0) : null;
                  const end = exportFilter.endDate ? new Date(exportFilter.endDate).setHours(23,59,59,999) : null;
                  const inDateRange = (!start || docDate >= start) && (!end || docDate <= end);
                  const matchTax = exportFilter.tax === 'Semua' || doc.vendor.ppn === exportFilter.tax;
                  return inDateRange && matchTax;
                });

                if(exportedData.length === 0) return alert("Tidak ada data yang sesuai dengan rentang tanggal dan filter pajak ini.");

                let html = '<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>';
                html += `<h2>Laporan ${docTitle}</h2>`;
                html += `<p>Periode: ${exportFilter.startDate || 'Awal'} s/d ${exportFilter.endDate || 'Akhir'} ${settings.enablePPN !== false && appMode !== 'SJ' ? '| Filter Pajak: ' + exportFilter.tax : ''}</p>`;
                html += '<table border="1" style="border-collapse: collapse;">';
                
                if (appMode === 'SJ') {
                    html += `<tr style="background-color: #f2f2f2;"><th>Tanggal</th><th>No. ${appMode}</th><th>Nama ${partnerLabel}</th><th>Status</th></tr>`;
                    exportedData.forEach(doc => {
                        html += `<tr><td>${new Date(doc.date).toLocaleDateString('id-ID')}</td><td>${doc.poNumber}</td><td>${doc.vendor.name}</td><td>${doc.status}</td></tr>`;
                    });
                } else {
                    html += `<tr style="background-color: #f2f2f2;"><th>Tanggal</th><th>No. ${appMode}</th><th>Nama ${partnerLabel}</th><th>Pembayaran</th>${settings.enablePPN !== false ? '<th>Status Pajak</th>' : ''}<th>Subtotal</th><th>Status</th></tr>`;
                    exportedData.forEach(doc => {
                        html += `<tr><td>${new Date(doc.date).toLocaleDateString('id-ID')}</td><td>${doc.poNumber}</td><td>${doc.vendor.name}</td><td>${doc.vendor.payment}</td>${settings.enablePPN !== false ? '<td>' + doc.vendor.ppn + '</td>' : ''}<td>${doc.total}</td><td>${doc.status}</td></tr>`;
                    });
                }
                
                html += '</table></body></html>';

                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = `Laporan_${appMode}_${exportFilter.startDate || 'All'}.xls`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
                setIsExportModalOpen(false);
              };

              return (
                <div className="max-w-4xl mx-auto space-y-6 relative">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                    <h2 className="text-2xl font-bold text-[#1C1C1E]">Daftar {docTitle}</h2>
                    <div className="flex items-center gap-3">
                      <button onClick={() => setIsExportModalOpen(true)} className="flex items-center justify-center gap-2 bg-[#34C759] hover:bg-[#2DB34A] text-white px-5 py-2.5 rounded-full text-sm font-semibold transition-colors shadow-sm"><Download size={16} /> Export Excel</button>
                      <div className="relative w-full sm:w-64">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Search size={16} className="text-[#8E8E93]" /></div>
                        <input type="text" className="w-full bg-white border border-[#E5E5EA] text-[#1C1C1E] rounded-full py-2.5 pl-11 pr-4 text-sm focus:outline-none focus:border-[#007AFF] focus:ring-1 focus:ring-[#007AFF] transition-shadow shadow-sm" placeholder={`Cari No. / ${partnerLabel}...`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    {filteredDocs.length === 0 ? (
                      <div className="bg-white rounded-[2.5rem] p-12 text-center text-[#8E8E93] shadow-sm">{searchTerm ? 'Dokumen tidak ditemukan.' : 'Belum ada dokumen yang diajukan.'}</div>
                    ) : (
                      filteredDocs.map(doc => (
                        <div key={doc.id} className="bg-white rounded-[2.5rem] shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden border border-[#E5E5EA]">
                          <div className="p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 cursor-pointer hover:bg-[#F9F9F9] transition-colors" onClick={() => toggleExpand(doc.id)}>
                            <div className="flex items-start gap-4">
                              <div className={`p-4 rounded-full ${doc.status === 'Pending' ? 'bg-[#FFF500]/20 text-[#D4AF37]' : doc.status === 'Approved' ? 'bg-[#34C759]/20 text-[#34C759]' : 'bg-[#FF3B30]/20 text-[#FF3B30]'}`}><FileText size={24} /></div>
                              <div>
                                <div className="flex items-center gap-2 mb-1">
                                  <button onClick={(e) => { e.stopPropagation(); onLoadDoc(doc); }} className="font-bold text-[#007AFF] hover:text-[#0056b3] hover:underline text-lg" title="Buka & Edit">{doc.poNumber}</button>
                                  <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${doc.status === 'Approved' ? 'bg-[#34C759] text-white' : doc.status === 'Rejected' ? 'bg-[#FF3B30] text-white' : 'bg-[#FFCC00] text-black'}`}>{doc.status}</span>
                                </div>
                                <div className="text-sm text-[#8E8E93] font-medium">{doc.vendor.name} • {new Date(doc.date).toLocaleDateString('id-ID')}</div>
                              </div>
                            </div>
                            <div className="flex items-center justify-between sm:justify-end gap-6 sm:w-auto w-full">
                              
                              {appMode !== 'SJ' && (
                                  <div className="text-right">
                                    <div className="text-xs text-[#8E8E93] uppercase font-bold tracking-wider mb-1">Total</div>
                                    <div className="font-bold text-[#1C1C1E] text-xl">Rp {formatCurrency(doc.total)}</div>
                                  </div>
                              )}

                              <div className="flex items-center gap-3">
                                {userRole === 'Boss' && doc.status === 'Pending' && (
                                  <div className="flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => onUpdateStatus(doc.id, 'Approved', appMode)} className="w-12 h-12 flex items-center justify-center bg-[#34C759]/10 text-[#34C759] hover:bg-[#34C759] hover:text-white rounded-full transition-colors" title="Setujui"><CheckCircle size={24} /></button>
                                    <button onClick={() => onUpdateStatus(doc.id, 'Rejected', appMode)} className="w-12 h-12 flex items-center justify-center bg-[#FF3B30]/10 text-[#FF3B30] hover:bg-[#FF3B30] hover:text-white rounded-full transition-colors" title="Tolak"><XCircle size={24} /></button>
                                  </div>
                                )}
                                <div className="text-[#C7C7CC]">{expandedId === doc.id ? <ChevronUp size={24}/> : <ChevronDown size={24}/>}</div>
                              </div>
                            </div>
                          </div>

                          {expandedId === doc.id && (
                            <div className="border-t border-[#F2F2F7] bg-[#F9F9FB] p-6">
                              <h4 className="font-bold text-[#8E8E93] text-sm uppercase tracking-wider mb-4">Detail Item</h4>
                              <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                  <thead className="text-xs text-[#8E8E93] uppercase bg-white/50 border-b border-[#E5E5EA]">
                                    <tr>
                                        <th className="px-4 py-3 rounded-tl-[1.5rem]">Deskripsi</th>
                                        <th className="px-4 py-3 text-center">Qty</th>
                                        {appMode !== 'SJ' && <th className="px-4 py-3 text-right">Harga</th>}
                                        {appMode !== 'SJ' && <th className="px-4 py-3 text-right rounded-tr-[1.5rem]">Subtotal</th>}
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-[#F2F2F7]">
                                    {doc.items.map((item, idx) => {
                                      const netPrice = !item.discounts || item.discounts.length === 0 ? item.price : item.discounts.reduce((acc, d) => acc - (acc * (d / 100)), item.price);
                                      return (
                                        <tr key={idx} className="bg-white hover:bg-white/80 transition-colors">
                                          <td className="px-4 py-4 font-semibold text-[#1C1C1E]">{item.desc}</td>
                                          <td className="px-4 py-4 text-center text-[#8E8E93]">{item.qty} {item.unit}</td>
                                          {appMode !== 'SJ' && <td className="px-4 py-4 text-right text-[#8E8E93]">Rp {formatCurrency(item.price)}</td>}
                                          {appMode !== 'SJ' && <td className="px-4 py-4 text-right font-bold text-[#1C1C1E]">Rp {formatCurrency(item.qty * netPrice)}</td>}
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                              {doc.note && (
                                <div className="mt-6 p-4 bg-white border border-[#E5E5EA] rounded-3xl">
                                  <span className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-1">Catatan:</span>
                                  <p className="text-sm text-[#1C1C1E]">{doc.note}</p>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      ))
                    )}
                  </div>

                  {/* Export Modal */}
                  {isExportModalOpen && (
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                      <div className="bg-white rounded-[2.5rem] shadow-xl w-full max-w-sm overflow-hidden">
                        <div className="px-6 py-5 border-b border-[#F2F2F7] flex justify-between items-center bg-[#F9F9F9]">
                          <h3 className="font-bold text-[#1C1C1E]">Export ke Excel</h3>
                          <button onClick={() => setIsExportModalOpen(false)} className="text-[#8E8E93] hover:text-[#FF3B30] transition-colors"><XCircle size={20}/></button>
                        </div>
                        <div className="p-8 space-y-6">
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Dari Tanggal</label>
                              <input type="date" value={exportFilter.startDate} onChange={e => setExportFilter({...exportFilter, startDate: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-full px-5 py-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]" />
                            </div>
                            <div>
                              <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Sampai Tanggal</label>
                              <input type="date" value={exportFilter.endDate} onChange={e => setExportFilter({...exportFilter, endDate: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-full px-5 py-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]" />
                            </div>
                          </div>
                          
                          {settings.enablePPN !== false && appMode !== 'SJ' && (
                              <div>
                                <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Status Pajak</label>
                                <select value={exportFilter.tax} onChange={e => setExportFilter({...exportFilter, tax: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-full px-5 py-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]">
                                  <option value="Semua">Semua (PPN & Non-PPN)</option><option value="PPN">Hanya PPN</option><option value="Non-PPN">Hanya Non-PPN</option>
                                </select>
                              </div>
                          )}
                          <button onClick={handleExportExcel} className="w-full bg-[#34C759] hover:bg-[#2DB34A] text-white font-bold py-4 rounded-full transition-colors shadow-sm flex items-center justify-center gap-2 mt-4"><Download size={18} /> Unduh (.xls)</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            }

            // --- 3. PARTNER LIST VIEW ---
            function PartnerView({ appMode, partners, docs, onAddPartner, onEditPartner, onDeletePartner, settings }) {
              const [isFormOpen, setIsFormOpen] = useState(false);
              const [isEditing, setIsEditing] = useState(false);
              const [formData, setFormData] = useState({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });

              const partnerLabel = appMode === 'PO' ? 'Supplier' : 'Customer';

              const openAddForm = () => {
                if (isEditing) {
                  setIsEditing(false);
                  setFormData({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });
                  setIsFormOpen(true);
                } else {
                  setIsFormOpen(!isFormOpen);
                  setFormData({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });
                }
              };

              const openEditForm = (sup) => {
                setFormData(sup);
                setIsEditing(true);
                setIsFormOpen(true);
              };

              const handleSave = (e) => {
                e.preventDefault();
                if (!formData.name) return alert(`Nama ${partnerLabel} wajib diisi!`);
                if (isEditing) { onEditPartner(formData, appMode); } else { onAddPartner({ ...formData, id: Date.now() }, appMode); }
                setFormData({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });
                setIsFormOpen(false); setIsEditing(false);
              };

              const handleDelete = (id) => {
                const isUsed = docs.some(p => p.vendor && p.vendor.id === id);
                if (isUsed) { return alert(`PENTING: Tidak dapat menghapus ${partnerLabel.toLowerCase()} ini karena sudah pernah digunakan di dalam dokumen.`); }
                if(confirm(`Hapus ${partnerLabel.toLowerCase()} ini secara permanen?`)) onDeletePartner(id, appMode); 
              };

              return (
                <div className="max-w-4xl mx-auto space-y-6">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-2xl font-bold text-[#1C1C1E]">Daftar {partnerLabel}</h2>
                    <button onClick={openAddForm} className="flex items-center justify-center w-12 h-12 bg-[#007AFF] text-white rounded-full shadow-sm transition-transform hover:scale-105">{isFormOpen && !isEditing ? <XCircle size={24} /> : <Plus size={24} />}</button>
                  </div>

                  {isFormOpen && (
                    <form onSubmit={handleSave} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-[#E5E5EA] space-y-5">
                      <div className="flex items-center justify-between border-b border-[#F2F2F7] pb-4 mb-4">
                          <h3 className="font-bold text-xl text-[#1C1C1E]">{isEditing ? `Edit Informasi ${partnerLabel}` : `Tambah ${partnerLabel} Baru`}</h3>
                          <button type="button" onClick={() => setIsFormOpen(false)} className="text-[#8E8E93] hover:text-[#FF3B30]"><XCircle size={24}/></button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div className="space-y-2"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-2">Nama {partnerLabel} *</label><input required type="text" className="w-full bg-[#F2F2F7] rounded-full px-6 py-4 outline-none focus:ring-2 focus:ring-[#007AFF] transition-shadow" placeholder={`PT. Nama ${partnerLabel}`} value={formData.name} onChange={e => setFormData({...formData, name: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} /></div>
                        <div className="space-y-2"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-2">No. Telepon</label><input type="text" className="w-full bg-[#F2F2F7] rounded-full px-6 py-4 outline-none focus:ring-2 focus:ring-[#007AFF] transition-shadow" placeholder="0812..." value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} onFocus={(e) => e.target.select()} /></div>
                        
                        <div className="space-y-2">
                          <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-2">Pembayaran</label>
                          <select className="w-full bg-[#F2F2F7] rounded-full px-6 py-4 outline-none focus:ring-2 focus:ring-[#007AFF]" value={formData.payment} onChange={e => setFormData({...formData, payment: e.target.value})}>
                            <option value="Cash">Cash</option><option value="Tempo">Tempo</option>
                          </select>
                        </div>
                        
                        {settings.enablePPN !== false && (
                            <div className="space-y-2">
                              <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-2">Status Pajak</label>
                              <select className="w-full bg-[#F2F2F7] rounded-full px-6 py-4 outline-none focus:ring-2 focus:ring-[#007AFF]" value={formData.ppn} onChange={e => setFormData({...formData, ppn: e.target.value})}>
                                <option value="Non-PPN">Non-PPN</option><option value="PPN">PPN</option>
                              </select>
                            </div>
                        )}

                        <div className="space-y-2 md:col-span-2"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-2">Alamat (Opsional)</label><textarea className="w-full bg-[#F2F2F7] rounded-[2rem] px-6 py-4 outline-none focus:ring-2 focus:ring-[#007AFF]" rows="3" placeholder="Jl. Raya..." value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} onFocus={(e) => e.target.select()} /></div>
                      </div>
                      <div className="flex justify-end pt-4"><button type="submit" className="px-8 py-4 bg-[#007AFF] text-white rounded-full font-bold shadow-sm hover:bg-[#0056b3] transition-colors">{isEditing ? 'Simpan Perubahan' : `Simpan ${partnerLabel}`}</button></div>
                    </form>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    {partners.map(sup => (
                      <div key={sup.id} className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-[#E5E5EA] flex flex-col relative group hover:border-[#007AFF] transition-colors">
                        <div className="absolute top-5 right-5 flex items-center gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => openEditForm(sup)} className="p-2 text-[#007AFF] bg-[#E5F1FF] hover:bg-[#007AFF] hover:text-white rounded-full transition-colors"><Edit2 size={18} /></button>
                            <button onClick={() => handleDelete(sup.id)} className="p-2 text-[#FF3B30] bg-[#FFE5E5] hover:bg-[#FF3B30] hover:text-white rounded-full transition-colors"><Trash2 size={18} /></button>
                        </div>
                        <h3 className="font-bold text-xl text-[#1C1C1E] mb-1 pr-20">{sup.name}</h3>
                        <p className="text-[15px] text-[#8E8E93] mb-5">{sup.phone || 'Tidak ada telepon'}</p>
                        <div className="mt-auto">
                          <div className="flex gap-2 mb-4">
                            <span className="px-3 py-1.5 bg-[#F2F2F7] text-[#1C1C1E] text-xs font-bold rounded-full">{sup.payment}</span>
                            {settings.enablePPN !== false && <span className="px-3 py-1.5 bg-[#F2F2F7] text-[#1C1C1E] text-xs font-bold rounded-full">{sup.ppn}</span>}
                          </div>
                          <p className="text-[15px] text-[#1C1C1E] line-clamp-2">{sup.address || '-'}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            }

            // --- 4. SETTINGS VIEW ---
            function SettingsView({ settings, onSaveSettings, user, userRole, companyId, onLogout }) {
              const [localSettings, setLocalSettings] = useState(settings);
              const [isSaving, setIsSaving] = useState(false);
              const timeoutRef = React.useRef(null);

              // Sinkronisasi data saat pertama dimuat atau jika ada perubahan dari server
              useEffect(() => { 
                if (JSON.stringify(settings) !== JSON.stringify(localSettings)) {
                   setLocalSettings(settings); 
                }
              }, [settings]);

              // Logika Auto-Save (Simpan Otomatis) dengan Debounce 1 detik
              useEffect(() => {
                if (JSON.stringify(settings) === JSON.stringify(localSettings)) {
                    setIsSaving(false);
                    return;
                }
                
                setIsSaving(true);
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                
                timeoutRef.current = setTimeout(() => {
                    onSaveSettings(localSettings);
                    setIsSaving(false);
                }, 1000);

                return () => clearTimeout(timeoutRef.current);
              }, [localSettings]);

              const handleCopyId = () => {
                  navigator.clipboard.writeText(companyId).then(() => { alert("Kode Akses Tim disalin!"); });
              };

              return (
                <div className="max-w-3xl mx-auto space-y-8 pb-12">
                  <div className="flex justify-between items-center mb-6">
                     <div className="flex items-center gap-4">
                       <h2 className="text-2xl font-bold text-[#1C1C1E]">{userRole === 'Boss' ? "Pengaturan Sistem" : "Profil Saya"}</h2>
                       {isSaving && userRole === 'Boss' && (
                         <span className="flex items-center gap-1.5 text-xs font-bold text-[#8E8E93] bg-white px-3 py-1.5 rounded-full shadow-sm border border-[#E5E5EA]">
                           <svg className="animate-spin text-[#007AFF]" width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                           Menyimpan...
                         </span>
                       )}
                     </div>
                  </div>

                  <div className="space-y-8">
                    {/* Akun */}
                    <div>
                      <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Akun & Sesi</h3>
                      <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                        <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]">
                          <div className="flex items-center gap-4">
                             <div className="w-12 h-12 bg-[#F2F2F7] rounded-full flex items-center justify-center text-[#8E8E93]"><Users size={24}/></div>
                             <div>
                               <div className="text-lg font-bold text-[#1C1C1E]">{user.isAnonymous ? 'Akun Tamu' : user.email}</div>
                               <div className="text-sm text-[#8E8E93]">Peran: <span className="font-bold text-[#007AFF]">{userRole}</span></div>
                             </div>
                          </div>
                          <button onClick={onLogout} className="flex items-center gap-2 text-[#FF3B30] bg-[#FFE5E5] hover:bg-[#FFD1D1] px-5 py-3 rounded-full text-[15px] font-bold transition-colors">
                            <LogOut size={18} /> Keluar
                          </button>
                        </div>
                        {userRole === 'Boss' && (
                            <div className="flex flex-col p-6 bg-[#F9F9FB]">
                              <div className="text-[15px] font-bold text-[#1C1C1E] mb-3">Kode Akses Tim Anda</div>
                              <div className="flex items-center gap-3">
                                  <div className="flex-1 text-center font-mono text-xl font-bold tracking-widest text-[#007AFF] bg-[#E5F1FF] py-4 rounded-full border border-[#B3D7FF]">
                                    {companyId}
                                  </div>
                                  <button onClick={handleCopyId} className="bg-white border border-[#D1D1D6] text-[#1C1C1E] font-bold py-4 px-8 rounded-full hover:bg-[#F2F2F7] transition-colors whitespace-nowrap">Salin Kode</button>
                              </div>
                              <p className="text-sm text-[#8E8E93] mt-4">
                                *Berikan kode di atas kepada Tim Anda. Saat masuk dan memilih "Gabung ke Tim", mereka harus memasukkan kode ini agar dapat bekerja di data yang sama.
                              </p>
                            </div>
                        )}
                      </div>
                    </div>

                    {userRole === 'Boss' && (
                      <>
                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Alur Kerja & Perpajakan</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-6 border-b border-[#F2F2F7]">
                              <div className="w-3/4 pr-4">
                                <div className="text-[17px] font-bold text-[#1C1C1E]">Perusahaan PKP (Aktifkan PPN)</div>
                                <div className="text-sm text-[#8E8E93] mt-1">Jika dimatikan, opsi dan tampilan tabel terkait PPN akan disembunyikan sepenuhnya dari sistem.</div>
                              </div>
                              <div className="w-1/4 flex justify-end">
                                <label className="flex items-center cursor-pointer">
                                  <div className="relative">
                                    <input type="checkbox" className="sr-only" checked={localSettings.enablePPN === true} onChange={(e) => setLocalSettings({...localSettings, enablePPN: e.target.checked})} />
                                    <div className={`block w-14 h-8 rounded-full transition-colors ${localSettings.enablePPN === true ? 'bg-[#34C759]' : 'bg-[#E5E5EA]'}`}></div>
                                    <div className={`absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${localSettings.enablePPN === true ? 'transform translate-x-6' : ''} shadow-sm`}></div>
                                  </div>
                                </label>
                              </div>
                            </div>
                            <div className="flex items-center justify-between p-6">
                              <div className="w-3/4 pr-4">
                                <div className="text-[17px] font-bold text-[#1C1C1E]">Wajib Persetujuan (Approval)</div>
                                <div className="text-sm text-[#8E8E93] mt-1">Jika dimatikan, dokumen yang dibuat akan langsung berstatus 'Approved' dan bisa dicetak tanpa persetujuan Boss.</div>
                              </div>
                              <div className="w-1/4 flex justify-end">
                                <label className="flex items-center cursor-pointer">
                                  <div className="relative">
                                    <input type="checkbox" className="sr-only" checked={localSettings.requireApproval !== false} onChange={(e) => setLocalSettings({...localSettings, requireApproval: e.target.checked})} />
                                    <div className={`block w-14 h-8 rounded-full transition-colors ${localSettings.requireApproval !== false ? 'bg-[#34C759]' : 'bg-[#E5E5EA]'}`}></div>
                                    <div className={`absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${localSettings.requireApproval !== false ? 'transform translate-x-6' : ''} shadow-sm`}></div>
                                  </div>
                                </label>
                              </div>
                            </div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Identitas Perusahaan Anda</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/3 text-[15px] font-bold text-[#1C1C1E]">Nama Utama</div><div className="w-2/3"><input type="text" value={localSettings.companyName || ''} onChange={(e) => setLocalSettings({...localSettings, companyName: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-medium bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/3 text-[15px] font-bold text-[#1C1C1E]">Nama Penerima / Cabang</div><div className="w-2/3"><input type="text" value={localSettings.branchName || ''} onChange={(e) => setLocalSettings({...localSettings, branchName: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                            <div className="flex items-start justify-between p-5"><div className="w-1/3 text-[15px] font-bold text-[#1C1C1E]">Alamat Lengkap</div><div className="w-2/3"><textarea rows="2" value={localSettings.branchAddress || ''} onChange={(e) => setLocalSettings({...localSettings, branchAddress: e.target.value})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent resize-none"/></div></div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Konfigurasi Nomor Dokumen</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Prefix PO (Contoh: PO)</div><div className="w-1/2"><input type="text" value={localSettings.username || ''} onChange={(e) => setLocalSettings({...localSettings, username: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Nomor Selanjutnya PO</div><div className="w-1/2"><input type="number" value={localSettings.nextNumber || 1} onChange={(e) => setLocalSettings({...localSettings, nextNumber: Number(e.target.value)})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent" min="1"/></div></div>
                            
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Prefix SJ (Contoh: SJ)</div><div className="w-1/2"><input type="text" value={localSettings.sjUsername || ''} onChange={(e) => setLocalSettings({...localSettings, sjUsername: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Nomor Selanjutnya SJ</div><div className="w-1/2"><input type="number" value={localSettings.sjNextNumber || 1} onChange={(e) => setLocalSettings({...localSettings, sjNextNumber: Number(e.target.value)})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent" min="1"/></div></div>

                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Prefix Invoice</div><div className="w-1/2"><input type="text" value={localSettings.invUsername || ''} onChange={(e) => setLocalSettings({...localSettings, invUsername: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Nomor Selanjutnya Invoice</div><div className="w-1/2"><input type="number" value={localSettings.invNextNumber || 1} onChange={(e) => setLocalSettings({...localSettings, invNextNumber: Number(e.target.value)})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent" min="1"/></div></div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Penandatangan Dokumen</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Penandatangan PO</div><div className="w-1/2"><input type="text" value={localSettings.signatureNamePO !== undefined ? localSettings.signatureNamePO : localSettings.signatureName || ''} onChange={(e) => setLocalSettings({...localSettings, signatureNamePO: e.target.value})} placeholder="Nama Lengkap" onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Penandatangan SJ</div><div className="w-1/2"><input type="text" value={localSettings.signatureNameSJ !== undefined ? localSettings.signatureNameSJ : localSettings.signatureName || ''} onChange={(e) => setLocalSettings({...localSettings, signatureNameSJ: e.target.value})} placeholder="Nama Lengkap" onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-5"><div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Penandatangan Invoice</div><div className="w-1/2"><input type="text" value={localSettings.signatureNameINV !== undefined ? localSettings.signatureNameINV : localSettings.signatureName || ''} onChange={(e) => setLocalSettings({...localSettings, signatureNameINV: e.target.value})} placeholder="Nama Lengkap" onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Ukuran Kertas</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-5 border-b border-[#F2F2F7]">
                              <div className="w-1/2 text-[15px] font-bold text-[#1C1C1E]">Kertas PO</div>
                              <div className="w-1/2 flex justify-end">
                                <select value={localSettings.paperSizePO || 'Continuous Form'} onChange={(e) => setLocalSettings({...localSettings, paperSizePO: e.target.value})} className="w-full max-w-[200px] bg-[#F2F2F7] border-none rounded-full px-4 py-2 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF] text-center cursor-pointer">
                                  <option value="Continuous Form">Continuous Form</option>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-3 ml-4">Integrasi Spreadsheet</h3>
                          <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex flex-col p-6">
                              <div className="text-[15px] font-bold text-[#1C1C1E] mb-3">Google Apps Script Webhook URL</div>
                              <input type="text" value={localSettings.webhookUrl || ''} onChange={(e) => setLocalSettings({...localSettings, webhookUrl: e.target.value})} onFocus={(e) => e.target.select()} placeholder="https://script.google.com/macros/s/.../exec" className="w-full text-left outline-none text-[15px] text-[#007AFF] bg-[#F2F2F7] px-6 py-4 rounded-full border-none"/>
                              <p className="text-sm text-[#8E8E93] mt-4">*Aplikasi akan mengirimkan data (JSON) ke URL di atas saat simpan. Kosongkan jika tidak menggunakan Spreadsheet.</p>
                              
                              <details className="mt-6 border-t border-[#F2F2F7] pt-5 cursor-pointer group">
                                  <summary className="text-[15px] font-bold text-[#007AFF] outline-none hover:underline">Cara Menghubungkan ke Spreadsheet (Klik untuk membuka)</summary>
                                  <div className="mt-4 text-[15px] text-[#1C1C1E] space-y-3 cursor-auto leading-relaxed">
                                      <p>1. Buat <b>Google Spreadsheet</b> baru di akun Google Anda.</p>
                                      <p>2. Di menu atas, klik <b>Ekstensi</b> &gt; <b>Apps Script</b>.</p>
                                      <p>3. Hapus semua kode bawaan, lalu <i>paste</i> (tempel) kode cerdas berikut (Otomatis pisah Tab/Sheet):</p>
                                      <div className="bg-[#F2F2F7] p-5 rounded-3xl text-[13px] overflow-x-auto border border-[#E5E5EA] font-mono text-[#E3242B]">
{`function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // Tentukan nama sheet berdasarkan tipe dokumen (PO, SJ, INV)
    var sheetName = data.documentType || "Lainnya";
    var sheet = ss.getSheetByName(sheetName);
    
    // Jika sheet belum ada, otomatis buat sheet baru beserta headernya
    if (!sheet) {
      sheet = ss.insertSheet(sheetName);
      if (sheetName === "SJ") {
        sheet.appendRow(["Tanggal", "Nomor SJ", "Customer", "Status", "Catatan"]);
      } else {
        sheet.appendRow(["Tanggal", "Nomor Dokumen", "Mitra", "Total", "Pembayaran", "Status Pajak", "Status", "Catatan"]);
      }
      sheet.getRange(1, 1, 1, 8).setFontWeight("bold"); // Bold header
    }
    
    var docDate = new Date(data.date).toLocaleDateString('id-ID');
    var note = data.note ? data.note : "-";
    
    // Masukkan data sesuai dengan format sheet
    if (sheetName === "SJ") {
      sheet.appendRow([
        docDate, 
        data.poNumber, 
        data.vendor.name, 
        data.status,
        note
      ]);
    } else {
      sheet.appendRow([
        docDate, 
        data.poNumber, 
        data.vendor.name, 
        data.total, 
        data.vendor.payment,
        data.vendor.ppn,
        data.status,
        note
      ]);
    }
    
    return ContentService.createTextOutput(JSON.stringify({status: "success"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({error: err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`}
                                      </div>
                                      <p>4. Klik tombol <b>Terapkan (Deploy)</b> warna biru di kanan atas, pilih <b>Deployment baru</b>.</p>
                                      <p>5. Klik logo gerigi ⚙️ (Pilih Jenis), centang <b>Aplikasi Web</b>.</p>
                                      <p>6. Pada kolom "Akses", pastikan Anda mengubahnya menjadi <b>Semua Orang (Anyone)</b>. Lalu klik <b>Terapkan</b>.</p>
                                      <p>7. Jika diminta otorisasi, klik <i>Authorize Access</i>, pilih email Anda, klik <i>Advanced/Lanjutan</i>, lalu <i>Go to Project (Unsafe)</i>.</p>
                                      <p>8. Salin <b>URL Aplikasi Web</b> yang diberikan, dan tempelkan ke kotak Webhook di atas halaman ini.</p>
                                  </div>

                            </div>

                      </>
                    )}

            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        // Render
        if (window.firebaseAPI) { renderApp(); } else { window.addEventListener('firebaseLoaded', renderApp); }
    </script>
