<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Purchase Order - Universal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase ke window
        window.firebaseAPI = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut,
            getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc 
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
          Printer: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
          Save: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
          Plus: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Trash2: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
          CheckCircle: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
          XCircle: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>,
          Settings: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
          Users: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
          FileText: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
          ClipboardList: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>,
          ChevronDown: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
          ChevronUp: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
          Search: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
          Download: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
          LogOut: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
          Google: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>,
          Loader: ({size=24, className=""}) => <svg className={`animate-spin ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>,
          Building: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>,
          UserPlus: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
        };

        const { Printer, Save, Plus, Trash2, CheckCircle, XCircle, Settings, Users, FileText, ClipboardList, ChevronDown, ChevronUp, Search, Download, LogOut, Google, Loader, Building, UserPlus } = Icons;

        const renderApp = () => {
            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } = window.firebaseAPI;
            
            // Konfigurasi Firebase Anda
            const firebaseConfig = {
                apiKey: "AIzaSyDsg2KHIXIjfr52kpl9GUmnxJA-iciJzRI",
                authDomain: "pooo-a1c19.firebaseapp.com",
                projectId: "pooo-a1c19",
                storageBucket: "pooo-a1c19.firebasestorage.app",
                messagingSenderId: "744030550441",
                appId: "1:744030550441:web:b60090ce280cceb1c1acb8"
            };

            // Master ID untuk routing profile pengguna ke Company yang benar
            const GLOBAL_ROUTER_ID = 'PO_GLOBAL_ROUTER_V1'; 
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // --- KOMPONEN AUTENTIKASI ---
            function AuthScreen() {
              const [isLogin, setIsLogin] = useState(true);
              const [email, setEmail] = useState('');
              const [password, setPassword] = useState('');
              const [error, setError] = useState('');
              const [loading, setLoading] = useState(false);

              const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                  if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                  } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                  }
                } catch (err) {
                  let msg = err.message;
                  if(err.code === 'auth/invalid-credential') msg = 'Email atau password salah.';
                  if(err.code === 'auth/email-already-in-use') msg = 'Email ini sudah terdaftar.';
                  if(err.code === 'auth/weak-password') msg = 'Password minimal 6 karakter.';
                  setError(msg);
                } finally {
                  setLoading(false);
                }
              };

              const handleGoogleAuth = async () => {
                setError('');
                const provider = new GoogleAuthProvider();
                try {
                  await signInWithPopup(auth, provider);
                } catch (err) {
                  setError(err.message);
                }
              };

              return (
                <div className="min-h-screen bg-[#F2F2F7] flex flex-col justify-center items-center p-4 font-sans text-[#1C1C1E]">
                  <div className="bg-white w-full max-w-md rounded-3xl shadow-lg p-8 relative overflow-hidden border border-[#E5E5EA]">
                    
                    <div className="text-center mb-8">
                      <div className="w-14 h-14 bg-[#007AFF] rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-md">PO</div>
                      <h1 className="text-2xl font-bold tracking-tight">PO System</h1>
                      <p className="text-[#8E8E93] text-sm mt-1">Sistem Manajemen Purchase Order</p>
                    </div>

                    <div className="flex bg-[#F2F2F7] rounded-xl p-1 mb-6">
                      <button onClick={() => setIsLogin(true)} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${isLogin ? 'bg-white shadow-sm text-[#1C1C1E]' : 'text-[#8E8E93]'}`}>Masuk</button>
                      <button onClick={() => setIsLogin(false)} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${!isLogin ? 'bg-white shadow-sm text-[#1C1C1E]' : 'text-[#8E8E93]'}`}>Daftar</button>
                    </div>

                    {error && <div className="bg-[#FFE5E5] text-[#FF3B30] text-sm p-3 rounded-xl mb-4 text-center border border-[#FFD1D1]">{error}</div>}

                    <form onSubmit={handleEmailAuth} className="space-y-4">
                      <div>
                        <input type="email" placeholder="Alamat Email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-[#F2F2F7] border-none rounded-xl px-4 py-3.5 text-[15px] outline-none focus:ring-2 focus:ring-[#007AFF] transition-all" required />
                      </div>
                      <div>
                        <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-[#F2F2F7] border-none rounded-xl px-4 py-3.5 text-[15px] outline-none focus:ring-2 focus:ring-[#007AFF] transition-all" required />
                      </div>
                      <button type="submit" disabled={loading} className="w-full bg-[#007AFF] hover:bg-[#0056b3] text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm flex justify-center items-center">
                        {loading ? <Loader size={20} /> : (isLogin ? 'Masuk' : 'Buat Akun')}
                      </button>
                    </form>

                    <div className="flex items-center my-6">
                      <div className="flex-1 border-t border-[#E5E5EA]"></div>
                      <span className="px-3 text-[#8E8E93] text-sm font-medium">ATAU</span>
                      <div className="flex-1 border-t border-[#E5E5EA]"></div>
                    </div>

                    <div className="space-y-3">
                      <button onClick={handleGoogleAuth} className="w-full bg-white border border-[#D1D1D6] hover:bg-[#F2F2F7] text-[#1C1C1E] font-semibold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-3">
                        <Google size={20} /> Lanjutkan dengan Google
                      </button>
                    </div>

                  </div>
                </div>
              );
            }

            // --- KOMPONEN ONBOARDING (PILIH BUAT ATAU GABUNG PERUSAHAAN) ---
            function OnboardingScreen({ user, onComplete, onLogout }) {
               const [loading, setLoading] = useState(false);
               const [joinCode, setJoinCode] = useState('');
               const [mode, setMode] = useState('select'); // 'select', 'join'

               const generateCompanyId = () => "COMP-" + Math.random().toString(36).substr(2, 6).toUpperCase();

               const handleCreateCompany = async () => {
                  setLoading(true);
                  const newCompanyId = generateCompanyId();
                  try {
                     // Simpan profile pengguna sebagai Boss dari company baru
                     await setDoc(doc(db, 'artifacts', GLOBAL_ROUTER_ID, 'users', user.uid, 'profile', 'main'), { 
                         companyId: newCompanyId, 
                         role: 'Boss' 
                     });
                     
                     // Setup pengaturan default untuk company tersebut
                     await setDoc(doc(db, 'artifacts', newCompanyId, 'public', 'data', 'settings', 'main'), {
                         companyName: 'NAMA PERUSAHAAN',
                         branchName: 'NAMA CABANG',
                         branchAddress: 'Alamat Cabang Perusahaan Anda',
                         username: 'PO',
                         nextNumber: 1,
                         signatureName: 'Nama Boss',
                         webhookUrl: ''
                     });
                     
                     onComplete({ companyId: newCompanyId, role: 'Boss' });
                  } catch(e) {
                     console.error(e);
                     alert("Gagal membuat perusahaan. Cek koneksi Anda.");
                     setLoading(false);
                  }
               };

               const handleJoinCompany = async (e) => {
                  e.preventDefault();
                  if(!joinCode.trim()) return;
                  setLoading(true);
                  try {
                     // Ubah format agar seragam uppercase
                     const formattedCode = joinCode.trim().toUpperCase();
                     
                     // Simpan profile pengguna sebagai Staff
                     await setDoc(doc(db, 'artifacts', GLOBAL_ROUTER_ID, 'users', user.uid, 'profile', 'main'), { 
                         companyId: formattedCode, 
                         role: 'Staff' 
                     });
                     
                     onComplete({ companyId: formattedCode, role: 'Staff' });
                  } catch(e) {
                     console.error(e);
                     alert("Gagal bergabung. Cek koneksi Anda.");
                     setLoading(false);
                  }
               };

               return (
                <div className="min-h-screen bg-[#F2F2F7] flex flex-col justify-center items-center p-4 font-sans text-[#1C1C1E]">
                  <div className="bg-white w-full max-w-md rounded-3xl shadow-lg p-8 relative border border-[#E5E5EA]">
                    
                    <div className="text-center mb-8">
                      <h2 className="text-2xl font-bold tracking-tight mb-2">Selamat Datang!</h2>
                      <p className="text-[#8E8E93] text-sm">Masuk sebagai: <b>{user.email}</b></p>
                    </div>

                    {mode === 'select' && (
                        <div className="space-y-4 mb-8">
                           <button 
                              onClick={handleCreateCompany} 
                              disabled={loading}
                              className="w-full border-2 border-[#007AFF] bg-blue-50/50 hover:bg-blue-50 rounded-2xl p-4 flex items-center gap-4 transition-colors text-left"
                            >
                              <div className="bg-[#007AFF] text-white p-3 rounded-full"><Building size={24}/></div>
                              <div>
                                 <div className="font-bold text-[#1C1C1E] text-lg">Buat Perusahaan Baru</div>
                                 <div className="text-sm text-[#8E8E93]">Saya adalah Boss / Pengelola.</div>
                              </div>
                           </button>

                           <button 
                              onClick={() => setMode('join')} 
                              disabled={loading}
                              className="w-full border-2 border-[#34C759] bg-green-50/50 hover:bg-green-50 rounded-2xl p-4 flex items-center gap-4 transition-colors text-left"
                            >
                              <div className="bg-[#34C759] text-white p-3 rounded-full"><UserPlus size={24}/></div>
                              <div>
                                 <div className="font-bold text-[#1C1C1E] text-lg">Gabung Perusahaan</div>
                                 <div className="text-sm text-[#8E8E93]">Saya memiliki Kode Invite dari Boss.</div>
                              </div>
                           </button>
                        </div>
                    )}

                    {mode === 'join' && (
                        <form onSubmit={handleJoinCompany} className="mb-8">
                            <p className="text-sm font-medium mb-2 text-center text-[#8E8E93]">Masukkan Kode Perusahaan (Minta ke Boss Anda)</p>
                            <input 
                                type="text" 
                                placeholder="Contoh: COMP-XXXXX" 
                                value={joinCode}
                                onChange={(e) => setJoinCode(e.target.value)}
                                className="w-full bg-[#F2F2F7] border-none rounded-xl px-4 py-3.5 text-center font-bold text-lg tracking-widest uppercase outline-none focus:ring-2 focus:ring-[#34C759] transition-all mb-4"
                                required
                            />
                            <div className="flex gap-2">
                                <button type="button" onClick={() => setMode('select')} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3.5 rounded-xl transition-colors">Batal</button>
                                <button type="submit" disabled={loading} className="flex-1 bg-[#34C759] hover:bg-[#2DB34A] text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm">Gabung</button>
                            </div>
                        </form>
                    )}

                    <button onClick={onLogout} className="w-full text-[#FF3B30] font-semibold py-2 hover:bg-[#FFE5E5] rounded-xl transition-colors">
                      Keluar Akun
                    </button>
                  </div>
                </div>
               );
            }

            // --- MAIN APP COMPONENT ---
            function App() {
              const [user, setUser] = useState(null);
              const [userProfile, setUserProfile] = useState(null); // { companyId, role }
              const [isLoadingAuth, setIsLoadingAuth] = useState(true);
              
              const [activeTab, setActiveTab] = useState('create');
              const [editingPo, setEditingPo] = useState(null);
              
              // Global States (Default akan ditimpa oleh data server)
              const [settings, setSettings] = useState({
                companyName: 'NAMA PERUSAHAAN', branchName: 'CABANG', branchAddress: '', username: 'PO', nextNumber: 1, signatureName: '', webhookUrl: ''
              });
              const [suppliers, setSuppliers] = useState([]);
              const [pos, setPos] = useState([]);

              // 1. Pantau Status Login
              useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                  setUser(u);
                  if(!u) setIsLoadingAuth(false);
                });
                return () => unsubscribe();
              }, []);

              // 2. Fetch Profile dari Global Router
              useEffect(() => {
                if (!user) return;

                const profileRef = doc(db, 'artifacts', GLOBAL_ROUTER_ID, 'users', user.uid, 'profile', 'main');
                const unsubProfile = onSnapshot(profileRef, (snap) => {
                  if (snap.exists() && snap.data().companyId) {
                    setUserProfile({
                        companyId: snap.data().companyId,
                        role: snap.data().role
                    });
                  } else {
                    setUserProfile('UNASSIGNED');
                  }
                  setIsLoadingAuth(false);
                }, console.error);

                return () => unsubProfile();
              }, [user]);

              // 3. Fetch Data Perusahaan Spesifik (Berdasarkan CompanyId)
              useEffect(() => {
                if (!userProfile || userProfile === 'UNASSIGNED') return;

                const companyId = userProfile.companyId;

                // Sync Pengaturan
                const setRef = doc(db, 'artifacts', companyId, 'public', 'data', 'settings', 'main');
                const unsubSet = onSnapshot(setRef, (snap) => {
                  if (snap.exists()) setSettings(snap.data());
                }, console.error);

                // Sync Supplier
                const supRef = collection(db, 'artifacts', companyId, 'public', 'data', 'suppliers');
                const unsubSup = onSnapshot(supRef, (snap) => {
                  setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, console.error);

                // Sync POs
                const posRef = collection(db, 'artifacts', companyId, 'public', 'data', 'pos');
                const unsubPos = onSnapshot(posRef, (snap) => {
                  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                  setPos(data.sort((a,b) => new Date(b.date) - new Date(a.date))); 
                }, console.error);

                return () => { unsubSet(); unsubSup(); unsubPos(); };
              }, [userProfile]);

              // Fungsi Logout
              const handleLogout = async () => {
                 if(confirm("Apakah Anda yakin ingin keluar?")) {
                    await signOut(auth);
                    setUserProfile(null);
                 }
              };

              if (isLoadingAuth) {
                  return <div className="h-screen w-full flex flex-col items-center justify-center bg-[#F2F2F7] text-[#8E8E93]"><Loader size={40} className="mb-4 text-[#007AFF]"/>Memuat Sistem...</div>;
              }

              if (!user) return <AuthScreen />;

              if (userProfile === 'UNASSIGNED') {
                 return <OnboardingScreen user={user} onComplete={setUserProfile} onLogout={handleLogout} />;
              }

              // Data Perusahaan
              const { companyId, role: userRole } = userProfile;

              // Fungsi Generate PO
              const generatePoNumber = (num) => {
                const date = new Date();
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                return `${settings.username || 'PO'}/${year}/${month}/${String(num).padStart(3, '0')}`;
              };

              // --- FUNGSI MUTASI FIREBASE KE COMPANY DATA ---
              const syncToSpreadsheet = async (poData) => {
                 if (!settings.webhookUrl || settings.webhookUrl.trim() === '') return;
                 try {
                     await fetch(settings.webhookUrl, {
                         method: 'POST',
                         mode: 'no-cors',
                         headers: { 'Content-Type': 'application/json' },
                         body: JSON.stringify(poData)
                     });
                 } catch(e) { console.error("Gagal sync Webhook:", e); }
              };

              const onSavePO = async (poData, isUpdate) => {
                try {
                  await setDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'pos', poData.id), poData);
                  if (!isUpdate) {
                    const newSettings = { ...settings, nextNumber: (settings.nextNumber || 1) + 1 };
                    await setDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'settings', 'main'), newSettings);
                  }
                  syncToSpreadsheet(poData);
                  alert(isUpdate ? "PO Berhasil Diperbarui!" : "PO Berhasil Disimpan & Menunggu Persetujuan!");
                } catch(e) { console.error(e); alert("Terjadi kesalahan saat menyimpan PO."); }
              };

              const onUpdateStatusPO = async (id, status) => {
                 if (userRole !== 'Boss') return alert("Akses Ditolak: Hanya Boss yang dapat mengubah status.");
                 try {
                   const poToUpdate = pos.find(p => p.id === id);
                   if (poToUpdate) {
                      const updatedPO = { ...poToUpdate, status };
                      await setDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'pos', id), updatedPO);
                      syncToSpreadsheet(updatedPO);
                   }
                 } catch(err) { console.error(err); }
              };

              const onAddSupplier = async (newSup) => {
                 await setDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'suppliers', newSup.id.toString()), newSup);
              };

              const onDeleteSupplier = async (id) => {
                 await deleteDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'suppliers', id.toString()));
              };

              const onSaveSettings = async (newSettings) => {
                 if (userRole !== 'Boss') return alert("Akses Ditolak: Hanya Boss yang dapat mengubah pengaturan.");
                 await setDoc(doc(db, 'artifacts', companyId, 'public', 'data', 'settings', 'main'), newSettings);
                 alert("Pengaturan Berhasil Disimpan!");
              };

              return (
                <div className="min-h-screen bg-[#F2F2F7] flex flex-col text-[#1C1C1E] antialiased" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif' }}>
                  <style>{`
                    @page { size: 9.5in 5.5in; margin: 0; }
                    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                    input, textarea, select { -webkit-user-select: auto !important; -moz-user-select: auto !important; -ms-user-select: auto !important; user-select: auto !important; }
                    input[type=number] { -moz-appearance: textfield; }
                  `}</style>

                  {/* Navigation */}
                  <nav className="bg-white/90 backdrop-blur-md shadow-sm border-b border-gray-200 print:hidden z-10 sticky top-0">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                      <div className="flex justify-between items-center h-16">
                        <div className="flex items-center gap-3">
                          <div className="w-8 h-8 bg-[#007AFF] rounded-lg flex items-center justify-center text-white font-bold text-sm">PO</div>
                          <span className="font-bold text-gray-800 tracking-tight text-lg hidden sm:block">System</span>
                          {/* Role Badge Indicator */}
                          <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${userRole === 'Boss' ? 'bg-[#007AFF]/10 text-[#007AFF]' : 'bg-[#34C759]/10 text-[#34C759]'}`}>
                             {userRole}
                          </span>
                        </div>
                        
                        <div className="flex gap-2 sm:gap-6 overflow-x-auto hide-scrollbar h-full items-end">
                          <NavButton active={activeTab === 'create'} onClick={() => { setActiveTab('create'); setEditingPo(null); }} icon={<FileText size={16} />} label="Buat PO" />
                          <NavButton active={activeTab === 'approve'} onClick={() => setActiveTab('approve')} icon={<ClipboardList size={16} />} label="Persetujuan" badge={pos.filter(p => p.status === 'Pending').length} />
                          <NavButton active={activeTab === 'suppliers'} onClick={() => setActiveTab('suppliers')} icon={<Users size={16} />} label="Supplier" />
                          <NavButton active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon={<Settings size={16} />} label={userRole === 'Boss' ? "Pengaturan" : "Profil"} />
                        </div>
                      </div>
                    </div>
                  </nav>

                  {/* Main Content Area */}
                  <main className="flex-1 overflow-auto p-4 sm:p-6 lg:p-8 print:p-0 print:bg-white pb-32">
                    {activeTab === 'create' && (
                      <CreatePOView 
                        suppliers={suppliers} settings={settings} setSettings={setSettings} 
                        editingPo={editingPo} setEditingPo={setEditingPo} onSavePO={onSavePO} generatePoNumber={generatePoNumber} userRole={userRole}
                      />
                    )}
                    {activeTab === 'approve' && (
                      <ApprovalView pos={pos} onLoadPO={(po) => { setEditingPo(po); setActiveTab('create'); }} onUpdateStatus={onUpdateStatusPO} userRole={userRole} />
                    )}
                    {activeTab === 'suppliers' && (
                      <SupplierView suppliers={suppliers} onAddSupplier={onAddSupplier} onDeleteSupplier={onDeleteSupplier} userRole={userRole} />
                    )}
                    {activeTab === 'settings' && (
                      <SettingsView settings={settings} onSaveSettings={onSaveSettings} user={user} userRole={userRole} companyId={companyId} onLogout={handleLogout} />
                    )}
                  </main>
                </div>
              );
            }

            function NavButton({ active, onClick, icon, label, badge }) {
              return (
                <button
                  onClick={onClick}
                  className={`
                    ${active ? 'text-[#007AFF] font-bold border-[#007AFF]' : 'text-[#8E8E93] hover:text-[#1C1C1E] border-transparent font-medium'}
                    flex items-center justify-center py-4 text-[14px] border-b-[3px] transition-colors gap-1.5 relative whitespace-nowrap
                  `}
                >
                  {icon}
                  {label}
                  {badge > 0 && (
                    <span className="absolute top-2 -right-3 bg-[#FF3B30] text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">
                      {badge}
                    </span>
                  )}
                </button>
              );
            }

            // --- 1. CREATE PO VIEW ---
            function CreatePOView({ suppliers, settings, setSettings, editingPo, setEditingPo, onSavePO, generatePoNumber, userRole }) {
              const defaultItems = [{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }];
              const [vendorId, setVendorId] = useState('');
              const [items, setItems] = useState(defaultItems);
              const [date, setDate] = useState(new Date());
              const [note, setNote] = useState('');
              const [isVendorDropdownOpen, setIsVendorDropdownOpen] = useState(false);
              const [vendorSearch, setVendorSearch] = useState('');
              const [discountModalId, setDiscountModalId] = useState(null);
              const [tempDiscounts, setTempDiscounts] = useState(['', '', '', '']);

              const selectedVendor = suppliers.find(s => s.id === vendorId) || {};
              const currentPoNumber = generatePoNumber(settings.nextNumber || 1);
              const isApproved = editingPo && editingPo.status === 'Approved';

              const formatCurrency = (num) => new Intl.NumberFormat('id-ID').format(num || 0);
              const formatDate = (date) => date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

              const handleAddItem = () => setItems([...items, { id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
              const handleRemoveItem = (id) => setItems(items.filter(item => item.id !== id));
              const handleItemChange = (id, field, value) => setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));

              const calculateNetPrice = (price, discounts) => {
                if (!discounts || discounts.length === 0) return price;
                return discounts.reduce((acc, d) => acc - (acc * (d / 100)), price);
              };

              const openDiscountModal = (item) => {
                setDiscountModalId(item.id);
                const d = item.discounts || [];
                setTempDiscounts([
                  d[0] !== undefined ? String(d[0]) : '', d[1] !== undefined ? String(d[1]) : '', 
                  d[2] !== undefined ? String(d[2]) : '', d[3] !== undefined ? String(d[3]) : ''
                ]);
              };

              const handleDiscountChange = (index, val) => {
                const newD = [...tempDiscounts];
                newD[index] = val;
                setTempDiscounts(newD);
              };

              const saveDiscounts = () => {
                setItems(prevItems => prevItems.map(item => {
                  if (item.id === discountModalId) {
                    const activeDiscounts = tempDiscounts.map(Number).filter(d => d > 0 && !isNaN(d));
                    const net = calculateNetPrice(item.price, activeDiscounts);
                    return { ...item, price: net, discounts: [] }; 
                  }
                  return item;
                }));
                setDiscountModalId(null);
              };

              useEffect(() => {
                if (editingPo) {
                  setVendorId(editingPo.vendor.id);
                  setItems(editingPo.items);
                  setDate(new Date(editingPo.date));
                  setNote(editingPo.note || '');
                } else {
                  setVendorId(suppliers.length > 0 ? suppliers[0].id : '');
                  setItems([{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
                  setDate(new Date());
                  setNote('');
                }
              }, [editingPo, suppliers]);

              const total = items.reduce((sum, item) => sum + (item.qty * calculateNetPrice(item.price, item.discounts)), 0);
              const isFormValid = vendorId && items.length > 0 && items.every(i => i.desc.trim() !== '' && i.qty > 0);

              const handleSave = () => {
                if (!isFormValid) return;
                const poData = {
                  id: editingPo ? editingPo.id : Date.now().toString(),
                  poNumber: editingPo ? editingPo.poNumber : currentPoNumber,
                  date: date.toISOString(), vendor: selectedVendor, items: items, total: total, note: note,
                  status: editingPo ? editingPo.status : 'Pending',
                  createdByRole: userRole
                };
                onSavePO(poData, !!editingPo);
                setEditingPo(null);
                setVendorId('');
                setItems([{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
                setNote('');
                setDate(new Date());
              };

              return (
                <div className="max-w-5xl mx-auto flex flex-col gap-6 relative">
                  
                  {/* Floating Action Bar */}
                  <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 z-50 print:hidden">
                    <button 
                      onClick={(e) => {
                        if (!isApproved) {
                          e.preventDefault();
                          alert("Cetak hanya tersedia untuk PO yang sudah disetujui (Approved). Silakan buka dari tab Persetujuan.");
                          return;
                        }
                        window.print();
                      }} 
                      className={`flex items-center justify-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-lg ${isApproved ? 'bg-[#F2F2F7] border border-[#D1D1D6] hover:bg-[#E5E5EA] text-[#1C1C1E]' : 'bg-gray-200 text-gray-400 border border-gray-300 cursor-not-allowed'}`}
                    >
                      <Printer size={18} /> Cetak
                    </button>
                    <button 
                      onClick={handleSave} 
                      disabled={!isFormValid}
                      className={`flex items-center justify-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-lg ${isFormValid ? 'bg-[#007AFF] hover:bg-[#0056b3] text-white cursor-pointer' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                    >
                      <Save size={18} /> Simpan
                    </button>
                  </div>

                  {/* 9.5 x 5.5 Inch Paper */}
                  <div className="bg-white p-6 shadow-md rounded-[2px] print:shadow-none print:p-0 w-[9.5in] min-h-[5.5in] h-auto flex flex-col mx-auto relative overflow-hidden text-black font-sans box-border" style={{ fontFamily: 'Arial, sans-serif' }}>
                    <div className="flex justify-between items-start mb-6">
                      <div>
                        <h1 className="text-[1.925rem] uppercase tracking-tight leading-none inline-block origin-top-left" style={{ fontFamily: '"Helvetica Neue", Helvetica, Arial, sans-serif', fontWeight: '800', transform: 'scaleY(1.1)', transformOrigin: 'left top' }}>
                          {settings.companyName || 'NAMA PERUSAHAAN'}
                        </h1>
                      </div>
                      <div className="text-right flex flex-col items-end">
                        <h2 className="text-xl font-bold uppercase tracking-wider mb-1">Purchase Order</h2>
                        <div className="text-sm mb-2">{formatDate(date)}</div>
                        <table className="text-sm">
                          <tbody>
                            <tr><td className="pr-4 py-0.5 text-left">PO</td><td className="pr-2 py-0.5">:</td><td className="text-left font-medium">{editingPo ? editingPo.poNumber : currentPoNumber}</td></tr>
                            <tr><td className="pr-4 py-0.5 text-left">Payment</td><td className="pr-2 py-0.5">:</td><td className="text-left">{selectedVendor.payment || '-'}</td></tr>
                            <tr><td className="pr-4 py-0.5 text-left">PPN</td><td className="pr-2 py-0.5">:</td><td className="text-left">{selectedVendor.ppn || '-'}</td></tr>
                          </tbody>
                        </table>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-8 mb-6 text-sm">
                      <div>
                        <div className="mb-1 print:hidden relative">
                          <div onClick={() => setIsVendorDropdownOpen(!isVendorDropdownOpen)} className="cursor-pointer text-base font-bold uppercase hover:text-[#007AFF] inline-flex items-center gap-1 text-black">
                            {selectedVendor.id ? selectedVendor.name : '-- Pilih Vendor --'} <ChevronDown size={14} />
                          </div>
                          {isVendorDropdownOpen && (
                            <div className="absolute top-full left-0 mt-1 w-64 bg-white border border-gray-200 shadow-xl rounded-lg z-50 overflow-hidden font-normal normal-case">
                              <div className="p-2 border-b border-gray-100 bg-gray-50">
                                <input autoFocus type="text" placeholder="Cari Vendor..." className="w-full p-1.5 text-sm outline-none bg-white border border-gray-200 rounded focus:border-[#007AFF]" value={vendorSearch} onChange={(e)=>setVendorSearch(e.target.value)} />
                              </div>
                              <div className="max-h-48 overflow-y-auto">
                                {suppliers.filter(s => s.name.toLowerCase().includes(vendorSearch.toLowerCase())).length === 0 ? (
                                  <div className="p-3 text-sm text-gray-500 text-center">Vendor tidak ditemukan</div>
                                ) : (
                                  suppliers.filter(s => s.name.toLowerCase().includes(vendorSearch.toLowerCase())).map(s => (
                                    <div key={s.id} className="p-3 hover:bg-blue-50 cursor-pointer text-sm border-b border-gray-50 last:border-0" onClick={() => { setVendorId(s.id); setIsVendorDropdownOpen(false); setVendorSearch(''); }}>
                                      <div className="font-bold text-gray-800">{s.name}</div>
                                    </div>
                                  ))
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                        <div className="font-bold mb-1 hidden print:block uppercase text-base">{selectedVendor.name || 'PILIH VENDOR'}</div>
                        <div className="text-gray-800 pr-12">{selectedVendor.address || 'Alamat Vendor (opsional)'}</div>
                      </div>
                      <div>
                        <div className="font-bold mb-1 uppercase text-base">{settings.branchName || 'CABANG'}</div>
                        <div className="text-gray-800 pr-4">{settings.branchAddress}</div>
                      </div>
                    </div>

                    <div className="mb-2 flex-1">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="border-t-2 border-b border-black">
                            <th className="py-1 px-1 text-center font-bold w-10">NO</th>
                            <th className="py-1 px-2 text-left font-bold">DESKRIPSI ITEM</th>
                            <th className="py-1 px-2 text-center font-bold w-12">Qty</th>
                            <th className="py-1 px-2 text-center font-bold w-16">UNIT</th>
                            <th className="py-1 px-2 text-right font-bold w-28">UNIT PRICE</th>
                            <th className="py-1 px-2 text-right font-bold w-32">SUB TOTAL</th>
                            <th className="py-1 px-0 w-8 print:hidden"></th>
                          </tr>
                        </thead>
                        <tbody>
                          {items.map((item, index) => (
                            <tr key={item.id} className="group relative border-b border-gray-100 print:border-none">
                              <td className="py-1.5 px-1 text-center align-top">{index + 1}</td>
                              <td className="py-1 px-2 align-top"><input type="text" value={item.desc} onChange={(e) => handleItemChange(item.id, 'desc', e.target.value)} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none uppercase" placeholder="Masukkan deskripsi barang..." /></td>
                              <td className="py-1 px-2 align-top text-center"><input type="number" value={item.qty} onChange={(e) => handleItemChange(item.id, 'qty', Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none text-center" min="1" /></td>
                              <td className="py-1 px-2 align-top text-center"><input type="text" value={item.unit} onChange={(e) => handleItemChange(item.id, 'unit', e.target.value)} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 print:border-none text-center uppercase" /></td>
                              <td className="py-1 px-2 align-top text-right">
                                <div className="flex flex-col items-end gap-1 print:hidden">
                                  <div className="flex items-center justify-end gap-1 w-full">
                                    <button onClick={() => openDiscountModal(item)} className="p-1 text-[#007AFF] hover:bg-[#E5F1FF] rounded-md transition-colors" title="Atur Diskon">%</button>
                                    <input type="number" value={item.price || ''} onChange={(e) => handleItemChange(item.id, 'price', Number(e.target.value))} onFocus={(e) => e.target.select()} className="w-full bg-transparent outline-none border-b border-transparent focus:border-gray-300 text-right" step="100" placeholder="0" />
                                  </div>
                                </div>
                                <div className="hidden print:block text-right">{formatCurrency(calculateNetPrice(item.price, item.discounts))}</div>
                              </td>
                              <td className="py-1.5 px-2 align-top text-right font-medium">{formatCurrency(item.qty * calculateNetPrice(item.price, item.discounts))}</td>
                              <td className="py-1 px-0 align-top text-center print:hidden">
                                <button onClick={() => handleRemoveItem(item.id)} className="text-[#FF3B30] opacity-0 group-hover:opacity-100 transition-opacity p-1 hover:bg-[#FFE5E5] rounded-md" title="Hapus baris"><Trash2 size={16} /></button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr>
                            <td colSpan="5" className="pt-2">
                              <button onClick={handleAddItem} className="print:hidden w-[80%] text-xs flex items-center justify-center gap-1.5 text-[#007AFF] font-bold px-2 py-2.5 bg-[#F2F2F7] hover:bg-[#E5E5EA] rounded-md transition-colors"><Plus size={14} /> TAMBAH BARIS</button>
                            </td>
                            <td className="pt-2 px-2 align-top text-right"><div className="border-t border-black pt-1"><span className="font-bold text-base tracking-wide">{formatCurrency(total)}</span></div></td>
                            <td className="print:hidden"></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>

                    <div className="mt-auto pt-4 px-2 grid grid-cols-2 gap-8 items-end">
                      <div className={`w-full mb-2 ${!note.trim() ? 'print:hidden' : ''}`}>
                         <div className="font-bold text-sm mb-1">Catatan :</div>
                         <textarea className="w-full bg-transparent border-transparent outline-none resize-none text-sm p-1.5 hover:bg-gray-50 focus:bg-gray-50 focus:ring-1 focus:ring-blue-100 rounded transition-all print:resize-none print:p-0 print:border-none" rows="3" value={note} onChange={(e) => setNote(e.target.value)} placeholder="Tambahkan catatan khusus... (opsional)" />
                      </div>
                      <div className="flex flex-col items-end col-start-2">
                        <div className="text-center w-48 relative pr-2">
                          <div className="h-16 mb-2"></div> 
                          <div className="border-t border-black"></div>
                          <div className="mt-1 text-sm font-bold flex items-center justify-center whitespace-nowrap">
                            <span>(</span>
                            <span className="relative inline-flex items-center justify-center">
                              <span className="invisible whitespace-pre min-w-[1px]">{settings.signatureName || ' '}</span>
                              {userRole === 'Boss' ? (
                                <input type="text" value={settings.signatureName || ''} onChange={(e) => setSettings({...settings, signatureName: e.target.value})} onFocus={(e) => e.target.select()} className="absolute inset-0 w-full h-full bg-transparent border-none text-center outline-none p-0 m-0" />
                              ) : (
                                <div className="absolute inset-0 w-full h-full bg-transparent border-none text-center outline-none p-0 m-0">{settings.signatureName}</div>
                              )}
                            </span>
                            <span>)</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Discount Modal */}
                  {discountModalId && (
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 print:hidden p-4">
                      <div className="bg-white rounded-2xl shadow-xl w-auto min-w-[340px] overflow-hidden">
                        <div className="px-6 py-4 border-b border-[#F2F2F7] flex justify-between items-center bg-[#F9F9F9]">
                          <h3 className="font-bold text-[#1C1C1E]">Diskon Beruntun</h3>
                          <button onClick={() => setDiscountModalId(null)} className="text-[#8E8E93] hover:text-[#FF3B30] transition-colors"><XCircle size={20}/></button>
                        </div>
                        <div className="p-6">
                          <div className="flex flex-wrap items-center justify-center gap-2 mb-6 w-full">
                            {[0, 1, 2, 3].map((idx) => (
                              <React.Fragment key={idx}>
                                <div className="relative">
                                  <input type="number" value={tempDiscounts[idx]} onChange={(e) => handleDiscountChange(idx, e.target.value)} onFocus={(e) => e.target.select()} className="w-16 bg-[#F2F2F7] border-none rounded-lg p-2 pr-4 text-center font-medium focus:ring-2 focus:ring-[#007AFF] outline-none" placeholder="0" />
                                  <span className="absolute right-1.5 top-2.5 text-[10px] text-[#8E8E93]">%</span>
                                </div>
                                {idx < 3 && <span className="text-[#8E8E93] font-bold">+</span>}
                              </React.Fragment>
                            ))}
                          </div>
                          <button onClick={saveDiscounts} className="w-full bg-[#007AFF] hover:bg-[#0056b3] text-white font-bold py-3 rounded-xl transition-colors shadow-sm">Terapkan Diskon</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            }

            // --- 2. APPROVAL VIEW ---
            function ApprovalView({ pos, onLoadPO, onUpdateStatus, userRole }) {
              const formatCurrency = (num) => new Intl.NumberFormat('id-ID').format(num);
              const [expandedId, setExpandedId] = useState(null);
              const [searchTerm, setSearchTerm] = useState('');
              const [isExportModalOpen, setIsExportModalOpen] = useState(false);
              const [exportFilter, setExportFilter] = useState({ startDate: '', endDate: '', tax: 'Semua' });

              const toggleExpand = (id) => setExpandedId(expandedId === id ? null : id);
              const filteredPos = pos.filter(po => po.poNumber.toLowerCase().includes(searchTerm.toLowerCase()) || po.vendor.name.toLowerCase().includes(searchTerm.toLowerCase()));

              const handleExportExcel = () => {
                const exportedData = pos.filter(po => {
                  const poDate = new Date(po.date).setHours(0,0,0,0);
                  const start = exportFilter.startDate ? new Date(exportFilter.startDate).setHours(0,0,0,0) : null;
                  const end = exportFilter.endDate ? new Date(exportFilter.endDate).setHours(23,59,59,999) : null;
                  const inDateRange = (!start || poDate >= start) && (!end || poDate <= end);
                  const matchTax = exportFilter.tax === 'Semua' || po.vendor.ppn === exportFilter.tax;
                  return inDateRange && matchTax;
                });

                if(exportedData.length === 0) return alert("Tidak ada data PO yang sesuai dengan rentang tanggal dan filter pajak ini.");

                let html = '<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>';
                html += '<h2>Laporan Purchase Order</h2>';
                html += `<p>Periode: ${exportFilter.startDate || 'Awal'} s/d ${exportFilter.endDate || 'Akhir'} | Filter Pajak: ${exportFilter.tax}</p>`;
                html += '<table border="1" style="border-collapse: collapse;">';
                html += '<tr style="background-color: #f2f2f2;"><th>Tanggal</th><th>No. PO</th><th>Nama Vendor</th><th>Pembayaran</th><th>Status Pajak</th><th>Subtotal</th><th>Status</th></tr>';
                exportedData.forEach(po => {
                    html += `<tr><td>${new Date(po.date).toLocaleDateString('id-ID')}</td><td>${po.poNumber}</td><td>${po.vendor.name}</td><td>${po.vendor.payment}</td><td>${po.vendor.ppn}</td><td>${po.total}</td><td>${po.status}</td></tr>`;
                });
                html += '</table></body></html>';

                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = `Laporan_PO_${exportFilter.startDate || 'All'}.xls`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
                setIsExportModalOpen(false);
              };

              return (
                <div className="max-w-4xl mx-auto space-y-6 relative">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                    <h2 className="text-2xl font-bold text-[#1C1C1E]">Persetujuan PO</h2>
                    <div className="flex items-center gap-3">
                      <button onClick={() => setIsExportModalOpen(true)} className="flex items-center justify-center gap-2 bg-[#34C759] hover:bg-[#2DB34A] text-white px-4 py-2 rounded-full text-sm font-semibold transition-colors shadow-sm"><Download size={16} /> Export Excel</button>
                      <div className="relative w-full sm:w-64">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Search size={16} className="text-[#8E8E93]" /></div>
                        <input type="text" className="w-full bg-white border border-[#E5E5EA] text-[#1C1C1E] rounded-full py-2 pl-9 pr-4 text-sm focus:outline-none focus:border-[#007AFF] focus:ring-1 focus:ring-[#007AFF] transition-shadow shadow-sm" placeholder="Cari No. PO / Vendor..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    {filteredPos.length === 0 ? (
                      <div className="bg-white rounded-2xl p-8 text-center text-[#8E8E93] shadow-sm">{searchTerm ? 'PO tidak ditemukan.' : 'Belum ada Purchase Order yang diajukan.'}</div>
                    ) : (
                      filteredPos.map(po => (
                        <div key={po.id} className="bg-white rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden border border-[#E5E5EA]">
                          <div className="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 cursor-pointer hover:bg-[#F9F9F9] transition-colors" onClick={() => toggleExpand(po.id)}>
                            <div className="flex items-start gap-4">
                              <div className={`p-3 rounded-full ${po.status === 'Pending' ? 'bg-[#FFF500]/20 text-[#D4AF37]' : po.status === 'Approved' ? 'bg-[#34C759]/20 text-[#34C759]' : 'bg-[#FF3B30]/20 text-[#FF3B30]'}`}><FileText size={24} /></div>
                              <div>
                                <div className="flex items-center gap-2 mb-1">
                                  <button onClick={(e) => { e.stopPropagation(); onLoadPO(po); }} className="font-bold text-[#007AFF] hover:text-[#0056b3] hover:underline text-lg" title="Buka & Edit PO">{po.poNumber}</button>
                                  <span className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${po.status === 'Approved' ? 'bg-[#34C759] text-white' : po.status === 'Rejected' ? 'bg-[#FF3B30] text-white' : 'bg-[#FFCC00] text-black'}`}>{po.status}</span>
                                </div>
                                <div className="text-sm text-[#8E8E93] font-medium">{po.vendor.name} • {new Date(po.date).toLocaleDateString('id-ID')}</div>
                              </div>
                            </div>
                            <div className="flex items-center justify-between sm:justify-end gap-6 sm:w-auto w-full">
                              <div className="text-right">
                                <div className="text-xs text-[#8E8E93] uppercase font-bold tracking-wider mb-0.5">Total</div>
                                <div className="font-bold text-[#1C1C1E] text-lg">Rp {formatCurrency(po.total)}</div>
                              </div>
                              <div className="flex items-center gap-3">
                                {/* HANYA BOSS YANG BISA MELIHAT TOMBOL SETUJUI / TOLAK */}
                                {userRole === 'Boss' && po.status === 'Pending' && (
                                  <div className="flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => onUpdateStatus(po.id, 'Approved')} className="w-10 h-10 flex items-center justify-center bg-[#34C759]/10 text-[#34C759] hover:bg-[#34C759] hover:text-white rounded-full transition-colors" title="Setujui PO"><CheckCircle size={22} /></button>
                                    <button onClick={() => onUpdateStatus(po.id, 'Rejected')} className="w-10 h-10 flex items-center justify-center bg-[#FF3B30]/10 text-[#FF3B30] hover:bg-[#FF3B30] hover:text-white rounded-full transition-colors" title="Tolak PO"><XCircle size={22} /></button>
                                  </div>
                                )}
                                <div className="text-[#C7C7CC]">{expandedId === po.id ? <ChevronUp size={24}/> : <ChevronDown size={24}/>}</div>
                              </div>
                            </div>
                          </div>

                          {expandedId === po.id && (
                            <div className="border-t border-[#F2F2F7] bg-[#F9F9FB] p-5">
                              <h4 className="font-bold text-[#8E8E93] text-sm uppercase tracking-wider mb-3">Detail Item</h4>
                              <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                  <thead className="text-xs text-[#8E8E93] uppercase bg-white/50 border-b border-[#E5E5EA]">
                                    <tr><th className="px-4 py-2 rounded-tl-lg">Deskripsi</th><th className="px-4 py-2 text-center">Qty</th><th className="px-4 py-2 text-right">Harga</th><th className="px-4 py-2 text-right rounded-tr-lg">Subtotal</th></tr>
                                  </thead>
                                  <tbody className="divide-y divide-[#F2F2F7]">
                                    {po.items.map((item, idx) => {
                                      const netPrice = !item.discounts || item.discounts.length === 0 ? item.price : item.discounts.reduce((acc, d) => acc - (acc * (d / 100)), item.price);
                                      return (
                                        <tr key={idx} className="bg-white hover:bg-white/80 transition-colors">
                                          <td className="px-4 py-3 font-semibold text-[#1C1C1E]">{item.desc}</td>
                                          <td className="px-4 py-3 text-center text-[#8E8E93]">{item.qty} {item.unit}</td>
                                          <td className="px-4 py-3 text-right text-[#8E8E93]">Rp {formatCurrency(item.price)}</td>
                                          <td className="px-4 py-3 text-right font-bold text-[#1C1C1E]">Rp {formatCurrency(item.qty * netPrice)}</td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                              {po.note && (
                                <div className="mt-4 p-3 bg-white border border-[#E5E5EA] rounded-lg">
                                  <span className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-1">Catatan:</span>
                                  <p className="text-sm text-[#1C1C1E]">{po.note}</p>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      ))
                    )}
                  </div>

                  {/* Export Modal */}
                  {isExportModalOpen && (
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
                        <div className="px-6 py-4 border-b border-[#F2F2F7] flex justify-between items-center bg-[#F9F9F9]">
                          <h3 className="font-bold text-[#1C1C1E]">Export ke Excel</h3>
                          <button onClick={() => setIsExportModalOpen(false)} className="text-[#8E8E93] hover:text-[#FF3B30] transition-colors"><XCircle size={20}/></button>
                        </div>
                        <div className="p-6 space-y-5">
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Dari Tanggal</label>
                              <input type="date" value={exportFilter.startDate} onChange={e => setExportFilter({...exportFilter, startDate: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-xl p-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]" />
                            </div>
                            <div>
                              <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Sampai Tanggal</label>
                              <input type="date" value={exportFilter.endDate} onChange={e => setExportFilter({...exportFilter, endDate: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-xl p-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]" />
                            </div>
                          </div>
                          <div>
                            <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider block mb-2">Status Pajak</label>
                            <select value={exportFilter.tax} onChange={e => setExportFilter({...exportFilter, tax: e.target.value})} className="w-full bg-[#F2F2F7] border-none rounded-xl p-3 text-sm text-[#1C1C1E] outline-none focus:ring-2 focus:ring-[#007AFF]">
                              <option value="Semua">Semua (PPN & Non-PPN)</option><option value="PPN">Hanya PPN</option><option value="Non-PPN">Hanya Non-PPN</option>
                            </select>
                          </div>
                          <button onClick={handleExportExcel} className="w-full bg-[#34C759] hover:bg-[#2DB34A] text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 mt-2"><Download size={18} /> Unduh (.xls)</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            }

            // --- 3. SUPPLIER LIST VIEW ---
            function SupplierView({ suppliers, onAddSupplier, onDeleteSupplier }) {
              const [isAdding, setIsAdding] = useState(false);
              const [formData, setFormData] = useState({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });

              const handleSave = (e) => {
                e.preventDefault();
                if (!formData.name) return alert("Nama PT wajib diisi!");
                onAddSupplier({ ...formData, id: Date.now() });
                setFormData({ id: '', name: '', payment: 'Cash', ppn: 'Non-PPN', address: '', phone: '' });
                setIsAdding(false);
              };

              const handleDelete = (id) => { if(confirm("Hapus supplier ini?")) onDeleteSupplier(id); };

              return (
                <div className="max-w-4xl mx-auto space-y-6">
                  <div className="flex items-center justify-between">
                    <h2 className="text-2xl font-bold text-[#1C1C1E]">Daftar Supplier</h2>
                    <button onClick={() => setIsAdding(!isAdding)} className="flex items-center justify-center w-10 h-10 bg-[#007AFF] text-white rounded-full shadow-sm transition-transform hover:scale-105">{isAdding ? <XCircle size={20} /> : <Plus size={20} />}</button>
                  </div>

                  {isAdding && (
                    <form onSubmit={handleSave} className="bg-white p-6 rounded-2xl shadow-sm border border-[#E5E5EA] space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="space-y-1.5"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-1">Nama Vendor *</label><input required type="text" className="w-full bg-[#F2F2F7] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#007AFF] transition-shadow" placeholder="PT. Nama Vendor" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} /></div>
                        <div className="space-y-1.5"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-1">No. Telepon</label><input type="text" className="w-full bg-[#F2F2F7] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#007AFF] transition-shadow" placeholder="0812..." value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} onFocus={(e) => e.target.select()} /></div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-1">Pembayaran</label>
                          <select className="w-full bg-[#F2F2F7] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#007AFF]" value={formData.payment} onChange={e => setFormData({...formData, payment: e.target.value})}>
                            <option value="Cash">Cash</option><option value="Tempo">Tempo</option><option value="Tempo 14 Hari">Tempo 14 Hari</option><option value="Tempo 30 Hari">Tempo 30 Hari</option>
                          </select>
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-1">Status Pajak</label>
                          <select className="w-full bg-[#F2F2F7] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#007AFF]" value={formData.ppn} onChange={e => setFormData({...formData, ppn: e.target.value})}>
                            <option value="Non-PPN">Non-PPN</option><option value="PPN">PPN</option><option value="PPN 11%">PPN 11%</option>
                          </select>
                        </div>
                        <div className="space-y-1.5 md:col-span-2"><label className="text-xs font-bold text-[#8E8E93] uppercase tracking-wider ml-1">Alamat (Opsional)</label><textarea className="w-full bg-[#F2F2F7] rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#007AFF]" rows="2" placeholder="Jl. Raya..." value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} onFocus={(e) => e.target.select()} /></div>
                      </div>
                      <div className="flex justify-end pt-2"><button type="submit" className="px-6 py-3 bg-[#007AFF] text-white rounded-xl font-bold shadow-sm hover:bg-[#0056b3] transition-colors">Simpan Supplier</button></div>
                    </form>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {suppliers.map(sup => (
                      <div key={sup.id} className="bg-white rounded-2xl p-5 shadow-sm border border-[#E5E5EA] flex flex-col relative group">
                        <button onClick={() => handleDelete(sup.id)} className="absolute top-4 right-4 text-[#C7C7CC] hover:text-[#FF3B30] transition-colors"><Trash2 size={20} /></button>
                        <h3 className="font-bold text-lg text-[#1C1C1E] mb-1 pr-8">{sup.name}</h3>
                        <p className="text-sm text-[#8E8E93] mb-4">{sup.phone || 'Tidak ada telepon'}</p>
                        <div className="mt-auto">
                          <div className="flex gap-2 mb-3"><span className="px-2.5 py-1 bg-[#F2F2F7] text-[#1C1C1E] text-xs font-bold rounded-lg">{sup.payment}</span><span className="px-2.5 py-1 bg-[#F2F2F7] text-[#1C1C1E] text-xs font-bold rounded-lg">{sup.ppn}</span></div>
                          <p className="text-sm text-[#1C1C1E] line-clamp-2">{sup.address || '-'}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            }

            // --- 4. SETTINGS VIEW ---
            function SettingsView({ settings, onSaveSettings, user, userRole, companyId, onLogout }) {
              const [localSettings, setLocalSettings] = useState(settings);
              useEffect(() => { setLocalSettings(settings); }, [settings]);
              const handleSave = () => { onSaveSettings(localSettings); };

              // Copy Company ID function
              const handleCopyId = () => {
                  navigator.clipboard.writeText(companyId).then(() => {
                      alert("Kode Perusahaan disalin!");
                  });
              };

              return (
                <div className="max-w-3xl mx-auto space-y-6 pb-12">
                  <div className="flex justify-between items-center mb-4">
                     <h2 className="text-2xl font-bold text-[#1C1C1E]">{userRole === 'Boss' ? "Pengaturan Sistem" : "Profil Saya"}</h2>
                     {userRole === 'Boss' && (
                        <button onClick={handleSave} className="bg-[#007AFF] hover:bg-[#0056b3] text-white px-5 py-2 rounded-full font-semibold shadow-sm transition-colors text-sm">Simpan Pengaturan</button>
                     )}
                  </div>

                  <div className="space-y-6">
                    
                    {/* Akun */}
                    <div>
                      <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-2 ml-4">Akun & Sesi</h3>
                      <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E5E5EA]">
                        <div className="flex items-center justify-between p-4 border-b border-[#F2F2F7]">
                          <div className="flex items-center gap-3">
                             <div className="w-10 h-10 bg-[#F2F2F7] rounded-full flex items-center justify-center text-[#8E8E93]"><Users size={20}/></div>
                             <div>
                               <div className="text-[15px] font-bold text-[#1C1C1E]">{user.isAnonymous ? 'Akun Tamu' : user.email}</div>
                               <div className="text-xs text-[#8E8E93]">Peran: <span className="font-bold text-[#007AFF]">{userRole}</span></div>
                             </div>
                          </div>
                          <button onClick={onLogout} className="flex items-center gap-2 text-[#FF3B30] bg-[#FFE5E5] hover:bg-[#FFD1D1] px-4 py-2 rounded-xl text-sm font-bold transition-colors">
                            <LogOut size={16} /> Keluar
                          </button>
                        </div>
                        {userRole === 'Boss' && (
                            <div className="flex flex-col p-4 bg-[#F9F9FB]">
                              <div className="text-[15px] font-medium text-[#1C1C1E] mb-2">Kode Invite Perusahaan Anda</div>
                              <div className="flex items-center gap-3">
                                  <div className="flex-1 text-center font-mono text-lg font-bold tracking-widest text-[#007AFF] bg-[#E5F1FF] py-3 rounded-xl border border-[#B3D7FF]">
                                    {companyId}
                                  </div>
