<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dokumen Terpadu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2pdf.js for Quick Save as PDF -->

    <!-- Firebase SDK (ES Modules) & TubesCursor -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Import 3D Tubes Cursor Component
        import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";

        // Expose Firebase & TubesCursor ke window agar bisa diakses oleh React
        window.firebaseAPI = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut,
            getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc 
        };
        window.TubesCursor = TubesCursor;
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
</head>
<body>

    <script type="text/babel">

          Settings: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
          Users: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
          FileText: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
          ClipboardList: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>,
          ChevronDown: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
          ChevronUp: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,

          Download: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
          LogOut: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
          Google: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>,
          Loader: ({size=24, className=""}) => <svg className={`animate-spin ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>,
          Building: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>,
          UserPlus: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>,
          Edit2: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>,
          Zap: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
          Target: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,
          ShieldCheck: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>,
          UserShield: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
          UserCheck: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>,
          FileDown: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M12 18v-6"></path><path d="M9 15l3 3 3-3"></path></svg>,
          Sun: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
          Moon: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        };

        const { Printer, Save, Plus, Trash2, CheckCircle, XCircle, Settings, Users, FileText, ClipboardList, ChevronDown, ChevronUp, Search, Download, LogOut, Google, Loader, Building, UserPlus, Edit2, Zap, Target, ShieldCheck, UserShield, UserCheck, FileDown, Sun, Moon } = Icons;

        const renderApp = () => {
            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc } = window.firebaseAPI;
            
            // Konfigurasi Firebase Anda
            const firebaseConfig = {
                apiKey: "AIzaSyDsg2KHIXIjfr52kpl9GUmnxJA-iciJzRI",
                authDomain: "pooo-a1c19.firebaseapp.com",
                projectId: "pooo-a1c19",
                storageBucket: "pooo-a1c19.firebasestorage.app",
                messagingSenderId: "744030550441",
                appId: "1:744030550441:web:b60090ce280cceb1c1acb8"
            };

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'Aplikasi_PO_YenBangunan'; 
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // --- KOMPONEN AUTENTIKASI (LANDING PAGE 3D TUBES & LIQUID GLASS) ---
            function AuthScreen() {
              const [isLogin, setIsLogin] = useState(true);
              const [email, setEmail] = useState('');
              const [password, setPassword] = useState('');
              const [confirmPassword, setConfirmPassword] = useState('');
              const [error, setError] = useState('');
              const [loading, setLoading] = useState(false);
              
              const [wordIndex, setWordIndex] = useState(0);
              const words = ['Purchase Order', 'Surat Jalan', 'Invoice'];

              const [greeting, setGreeting] = useState('Pagi');
              const [timeData, setTimeData] = useState({ text: 'Pagi', icon: '🌤️' });
              
              // --- FITUR DARK MODE & ANIMASI ---
              const [isDarkMode, setIsDarkMode] = useState(false); // Light Mode Default
              const tubesAppRef = useRef(null);

              // Set Waktu Sapaan Otomatis
              useEffect(() => {
                const hr = new Date().getHours();
                if (hr >= 5 && hr < 11) { setGreeting('Pagi'); setTimeData({ text: 'Pagi', icon: '🌤️' }); }
                else if (hr >= 11 && hr < 15) { setGreeting('Siang'); setTimeData({ text: 'Siang', icon: '☀️' }); }
                else if (hr >= 15 && hr < 18) { setGreeting('Sore'); setTimeData({ text: 'Sore', icon: '🌇' }); }
                else { setGreeting('Malam'); setTimeData({ text: 'Malam', icon: '🌙' }); }
              }, []);

              // Timer Rotasi Teks
              useEffect(() => {
                const interval = setInterval(() => {
                  setWordIndex(prev => (prev + 1) % words.length);
                }, 3000);
                return () => clearInterval(interval);
              }, [wordIndex]);

              // Inisialisasi Latar Belakang 3D (Hanya saat Dark Mode)
              useEffect(() => {
                if (isDarkMode && window.TubesCursor && !tubesAppRef.current) {
                  const canvas = document.getElementById('canvas');
                  if (canvas) {
                    tubesAppRef.current = window.TubesCursor(canvas, {
                      tubes: {
                        colors: ["#f967fb", "#53bc28", "#6958d5"],
                        lights: {
                          intensity: 200,
                          colors: ["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
                        }
                      }
                    });
                  }
                }
                
                // Matikan animasi jika beralih ke Light Mode
                if (!isDarkMode && tubesAppRef.current) {
                  if (typeof tubesAppRef.current.destroy === 'function') {
                    tubesAppRef.current.destroy();
                  }
                  tubesAppRef.current = null;
                }
                
                return () => {
                  if (tubesAppRef.current && typeof tubesAppRef.current.destroy === 'function') {
                    tubesAppRef.current.destroy();
                    tubesAppRef.current = null;
                  }
                };
              }, [isDarkMode]);

              // Fungsi Klik Latar untuk Acak Warna Tubes (Hanya di Dark Mode)
              const handleBgClick = (e) => {
                if (!isDarkMode || e.target.closest('.modal-container') || e.target.closest('.theme-toggle')) return;
                
                if (tubesAppRef.current && tubesAppRef.current.tubes) {
                  const randomColors = (count) => new Array(count).fill(0).map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'));
                  tubesAppRef.current.tubes.setColors(randomColors(3));
                  tubesAppRef.current.tubes.setLightsColors(randomColors(4));
                }
              };

              const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!isLogin && password !== confirmPassword) {
                  setError('Konfirmasi kata sandi tidak cocok!');
                  return;
                }

                setLoading(true);
                try {
                  if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                  } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                  }
                } catch (err) {
                  let msg = err.message;
                  if(err.code === 'auth/invalid-credential') msg = 'Email atau password salah.';
                  if(err.code === 'auth/email-already-in-use') msg = 'Email ini sudah terdaftar.';
                  if(err.code === 'auth/weak-password') msg = 'Password minimal 6 karakter.';
                  setError(msg);
                } finally {
                  setLoading(false);
                }
              };

              const handleGoogleAuth = async () => {
                setError('');
                const provider = new GoogleAuthProvider();
                try {
                  await signInWithPopup(auth, provider);
                } catch (err) {
                  setError(err.message);
                }
              };

              const handleAnonAuth = async () => {
                setError('');
                setLoading(true);
                try {
                  await signInAnonymously(auth);
                } catch (err) {
                  setError(err.message);
                  setLoading(false);
                }
              };

              return (
                <div 
                  className={`min-h-screen w-full flex items-center justify-center font-sans relative overflow-hidden transition-colors duration-700 ${isDarkMode ? 'bg-black text-white' : 'bg-[radial-gradient(circle_at_center,_#ffffff_15%,_#eef6ff_60%,_#c6e2ff_100%)] text-[#1C1C1E]'}`}
                  onClick={handleBgClick}
                >
                  
                  {/* Animasi Masuk (On-Load Animations) */}
                  <style>{`
                    /* Smooth Enter Animations */
                    @keyframes smoothEnter {
                      0% { opacity: 0; transform: translateY(30px); }
                      100% { opacity: 1; transform: translateY(0); }
                    }
                    .animate-enter {
                      opacity: 0;
                      animation: smoothEnter 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                    }
                    
                    /* Text Flip Animation */
                    @keyframes flipEnter {
                      0% { opacity: 0; transform: translateY(15px); }
                      100% { opacity: 1; transform: translateY(0); }
                    }
                    .flip-enter {
                      animation: flipEnter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                    }

                    .delay-100 { animation-delay: 0.1s; }
                    .delay-200 { animation-delay: 0.2s; }
                    .delay-300 { animation-delay: 0.3s; }
                  `}</style>
                  
                  {/* Toggle Mode Gelap / Terang */}
                  <button
                    className={`theme-toggle fixed top-6 right-6 sm:top-8 sm:right-8 z-50 p-3.5 rounded-full backdrop-blur-xl transition-all duration-500 shadow-xl border ${isDarkMode ? 'bg-white/10 text-yellow-400 hover:bg-white/20 border-white/20 hover:scale-110' : 'bg-white/40 text-indigo-600 hover:bg-white/60 border-white/50 hover:scale-110'}`}
                    onClick={(e) => { e.stopPropagation(); setIsDarkMode(!isDarkMode); }}
                    title={isDarkMode ? "Beralih ke Light Mode" : "Beralih ke Dark Mode (Animasi 3D)"}
                  >
                    {isDarkMode ? <Sun size={24} /> : <Moon size={24} />}
                  </button>
                  
                  {/* 3D Tubes Canvas Background (Hanya render jika Dark Mode Aktif) */}
                  {isDarkMode && <canvas id="canvas" className="fixed top-0 left-0 w-full h-full z-0 outline-none transition-opacity duration-1000"></canvas>}

                  {/* Layout Baru: Flexbox Penyelarasan Vertikal Sempurna & Simetris (Berada di atas Canvas) */}
                  <div className="w-full min-h-screen flex flex-col lg:flex-row items-center justify-center relative z-10 py-12 lg:py-0 overflow-hidden pointer-events-none">
                    
                    {/* Pembatas Lebar Aman agar di layar ultrawide konten tidak saling berjauhan */}
                    <div className="w-full max-w-[1440px] flex flex-col lg:flex-row items-center justify-between relative pointer-events-auto">
                      
                      {/* Bagian Kiri - Konten Teks & Fitur */}
                      <div className="flex-1 w-full flex justify-center lg:justify-start px-6 sm:px-12 lg:pl-16 xl:pl-24">
                        <div className="w-full max-w-[540px]">
                            <h1 className="text-4xl sm:text-5xl lg:text-[4rem] font-black tracking-tight mb-4 leading-[1.05] animate-enter">
                              <span className={`block mb-2 transition-colors duration-500 ${isDarkMode ? 'text-white' : 'text-[#1C1C1E]'}`} style={isDarkMode ? {textShadow: "0 0 20px rgba(0,0,0,1)"} : {}}>Bisa Buat</span>
                              <span 
                                onClick={() => setWordIndex(prev => (prev + 1) % words.length)}
                                className="text-[#007AFF] inline-block h-[1.1em] overflow-hidden align-bottom cursor-pointer hover:opacity-80 transition-opacity select-none"
                                style={isDarkMode ? {textShadow: "0 0 20px rgba(0,0,0,1)"} : {}}
                              >
                                <span key={wordIndex} className="inline-block flip-enter pb-2">{words[wordIndex]}</span>
                              </span>
                            </h1>
                            
                            <p className={`text-lg mb-6 leading-relaxed animate-enter delay-100 transition-colors duration-500 ${isDarkMode ? 'text-gray-300' : 'text-[#555]'}`} style={isDarkMode ? {textShadow: "0 0 10px rgba(0,0,0,0.8)"} : {}}>
                              Inilah sistem yang murni berfokus pada esensi pekerjaan Anda. Tanpa fitur ribet yang tak pernah dipakai, dan pastinya tanpa waktu <i>loading</i> lemot yang menyita waktu.
                            </p>

                            <div className="space-y-3 animate-enter delay-200">
                              
                              {/* Point 1 */}
                              <div className="relative h-[90px] z-30 group cursor-default">
                                <div className={`absolute inset-0 flex items-center gap-4 p-4 rounded-[2rem] backdrop-blur-xl border transition-all duration-300 ${isDarkMode ? 'bg-white/10 border-white/20 group-hover:bg-white/20 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.15),0_8px_32px_rgba(255,255,255,0.05)]' : 'bg-white/30 border-white/40 group-hover:bg-white/50 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.4),0_8px_32px_rgba(0,0,0,0.05)]'}`}>
                                  <div className={`p-3 rounded-full shrink-0 group-hover:scale-110 group-hover:bg-[#007AFF] group-hover:text-white transition-all duration-300 ${isDarkMode ? 'bg-[#007AFF]/20 text-[#007AFF]' : 'bg-[#E5F1FF] text-[#007AFF]'}`}>
                                     <Zap size={24} />
                                  </div>
                                  <div className="relative flex-1 h-full flex items-center overflow-hidden">
                                    <h3 className={`absolute w-full font-bold text-lg transition-all duration-300 transform translate-y-0 opacity-100 group-hover:-translate-y-8 group-hover:opacity-0 ${isDarkMode ? 'text-white' : 'text-[#1C1C1E]'}`}>
                                      Sat-Set & Langsung Cetak
                                    </h3>
                                    <p className={`absolute w-full text-[14px] leading-snug transition-all duration-300 transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 pr-2 ${isDarkMode ? 'text-gray-200' : 'text-[#333]'}`}>
                                      Satu halaman tanpa loading. Ketik, simpan, dan cetak dokumen dalam hitungan detik.
                                    </p>
                                  </div>
                                </div>
                              </div>
                              
                              {/* Point 2 */}
                              <div className="relative h-[90px] z-20 group cursor-default">
                                <div className={`absolute inset-0 flex items-center gap-4 p-4 rounded-[2rem] backdrop-blur-xl border transition-all duration-300 ${isDarkMode ? 'bg-white/10 border-white/20 group-hover:bg-white/20 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.15),0_8px_32px_rgba(255,255,255,0.05)]' : 'bg-white/30 border-white/40 group-hover:bg-white/50 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.4),0_8px_32px_rgba(0,0,0,0.05)]'}`}>
                                  <div className={`p-3 rounded-full shrink-0 group-hover:scale-110 group-hover:bg-[#007AFF] group-hover:text-white transition-all duration-300 ${isDarkMode ? 'bg-[#007AFF]/20 text-[#007AFF]' : 'bg-[#E5F1FF] text-[#007AFF]'}`}>
                                     <Target size={24} />
                                  </div>
                                  <div className="relative flex-1 h-full flex items-center overflow-hidden">
                                    <h3 className={`absolute w-full font-bold text-lg transition-all duration-300 transform translate-y-0 opacity-100 group-hover:-translate-y-8 group-hover:opacity-0 ${isDarkMode ? 'text-white' : 'text-[#1C1C1E]'}`}>
                                      Anti Ribet
                                    </h3>
                                    <p className={`absolute w-full text-[14px] leading-snug transition-all duration-300 transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 pr-2 ${isDarkMode ? 'text-gray-200' : 'text-[#333]'}`}>
                                      Antarmuka sangat bersih dan mudah dipahami. Siapapun bisa pakai tanpa perlu panduan khusus.
                                    </p>
                                  </div>
                                </div>
                              </div>
                              
                              {/* Point 3 */}
                              <div className="relative h-[90px] z-10 group cursor-default">
                                <div className={`absolute inset-0 flex items-center gap-4 p-4 rounded-[2rem] backdrop-blur-xl border transition-all duration-300 ${isDarkMode ? 'bg-white/10 border-white/20 group-hover:bg-white/20 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.15),0_8px_32px_rgba(255,255,255,0.05)]' : 'bg-white/30 border-white/40 group-hover:bg-white/50 group-hover:shadow-[inset_0_0_20px_rgba(255,255,255,0.4),0_8px_32px_rgba(0,0,0,0.05)]'}`}>
                                  <div className={`p-3 rounded-full shrink-0 group-hover:scale-110 group-hover:bg-[#007AFF] group-hover:text-white transition-all duration-300 ${isDarkMode ? 'bg-[#007AFF]/20 text-[#007AFF]' : 'bg-[#E5F1FF] text-[#007AFF]'}`}>
                                     <ShieldCheck size={24} />
                                  </div>
                                  <div className="relative flex-1 h-full flex items-center overflow-hidden">
                                    <h3 className={`absolute w-full font-bold text-lg transition-all duration-300 transform translate-y-0 opacity-100 group-hover:-translate-y-8 group-hover:opacity-0 ${isDarkMode ? 'text-white' : 'text-[#1C1C1E]'}`}>
                                      Otomatis Rekap
                                    </h3>
                                    <p className={`absolute w-full text-[14px] leading-snug transition-all duration-300 transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 pr-2 ${isDarkMode ? 'text-gray-200' : 'text-[#333]'}`}>
                                      Persetujuan instan antar tim. Data aman terpusat dan terhubung otomatis ke Google Sheets.
                                    </p>
                                  </div>
                                </div>
                              </div>

                            </div>
                        </div>
                      </div>

                      {/* Bagian Kanan - Formulir Login (Terpisah dari tepi, radius 2rem) */}
                      <div className="modal-container w-full lg:w-1/2 flex-shrink-0 animate-enter delay-300 mt-12 lg:mt-0 relative px-6 sm:px-12 lg:pr-16 xl:pr-24 flex justify-center lg:justify-end">
                         
                         {/* Modal Container */}
                         <div className={`w-full max-w-[480px] backdrop-blur-2xl border rounded-[2rem] p-8 sm:p-10 relative transition-all duration-500 ${isDarkMode ? 'bg-white/10 border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.5)]' : 'bg-white/40 border-white/50 shadow-[0_12px_40px_rgba(0,0,0,0.08)]'}`}>
                            
                            {/* Sapaan Pengguna Rata Tengah & Tanpa Emoji */}
                            <div className="mb-8 text-center">
                               <h2 className={`text-3xl font-black tracking-tight transition-colors duration-500 ${isDarkMode ? 'text-white' : 'text-[#1C1C1E]'}`} style={isDarkMode ? {textShadow: "0 0 15px rgba(0,0,0,0.8)"} : {}}>Selamat {greeting}</h2>
                            </div>

                            {error && <div className="bg-red-500/20 backdrop-blur-sm text-red-600 border border-red-500/50 text-sm p-4 rounded-full mb-6 text-center font-medium animate-pulse">{error}</div>}

                            <form onSubmit={handleEmailAuth} className="space-y-4">
                              <div>
                                <input 
                                  type="email" 
                                  placeholder="Alamat Email" 
                                  value={email} 
                                  onChange={(e) => setEmail(e.target.value)} 
                                  className={`w-full rounded-full px-6 py-4 text-[15px] outline-none focus:ring-2 focus:ring-[#007AFF] transition-all border ${isDarkMode ? 'bg-white/10 hover:bg-white/20 focus:bg-white/30 border-white/20 placeholder-gray-400 text-white' : 'bg-white/50 hover:bg-white/70 focus:bg-white border-white/50 placeholder-[#555] text-[#1C1C1E]'}`} 
                                  required 
                                />
                              </div>
                              <div>
                                <input 
                                  type="password" 
                                  placeholder="Kata Sandi" 
                                  value={password} 
                                  onChange={(e) => setPassword(e.target.value)} 
                                  className={`w-full rounded-full px-6 py-4 text-[15px] outline-none focus:ring-2 focus:ring-[#007AFF] transition-all border ${isDarkMode ? 'bg-white/10 hover:bg-white/20 focus:bg-white/30 border-white/20 placeholder-gray-400 text-white' : 'bg-white/50 hover:bg-white/70 focus:bg-white border-white/50 placeholder-[#555] text-[#1C1C1E]'}`} 
                                  required 
                                />
                              </div>

                              {/* Tambahan Kolom Konfirmasi Jika Daftar */}
                              {!isLogin && (
                                <div className="animate-enter">
                                  <input 
                                    type="password" 
                                    placeholder="Konfirmasi Kata Sandi" 
                                    value={confirmPassword} 
                                    onChange={(e) => setConfirmPassword(e.target.value)} 
                                    className={`w-full rounded-full px-6 py-4 text-[15px] outline-none focus:ring-2 focus:ring-[#007AFF] transition-all border ${isDarkMode ? 'bg-white/10 hover:bg-white/20 focus:bg-white/30 border-white/20 placeholder-gray-400 text-white' : 'bg-white/50 hover:bg-white/70 focus:bg-white border-white/50 placeholder-[#555] text-[#1C1C1E]'}`} 
                                    required 
                                  />
                                </div>
                              )}

                              <button type="submit" disabled={loading} className="w-full bg-[#007AFF] hover:bg-[#0056b3] hover:scale-[1.02] active:scale-[0.98] text-white font-bold py-4 rounded-full transition-all shadow-[0_8px_24px_rgba(0,122,255,0.35)] flex justify-center items-center mt-2">
                                {loading ? <Loader size={20} /> : (isLogin ? 'Masuk' : 'Daftar')}
                              </button>
                            </form>

                            {/* Tombol Interaktif Lainnya */}
                            <div className="mt-6 space-y-3.5 animate-enter delay-100">
                              
                              {/* Render Bertukar agar tinggi form tidak goyang ketika mendaftar */}
                              {isLogin ? (
                                <>
                                  <button type="button" onClick={() => { setIsLogin(false); setError(''); }} className={`w-full backdrop-blur-md border font-bold py-3.5 rounded-full transition-all ${isDarkMode ? 'bg-white/10 border-white/20 hover:bg-white/20 text-white' : 'bg-white/40 border-white/50 hover:bg-white/60 text-[#1C1C1E] shadow-sm'}`}>
                                    Daftar Akun Baru
                                  </button>

                                  <button type="button" onClick={handleGoogleAuth} className={`group w-full backdrop-blur-md border font-bold py-3.5 rounded-full transition-all flex items-center justify-center gap-3 ${isDarkMode ? 'bg-white/20 border-white/20 hover:bg-white/30 text-white' : 'bg-white/60 border-white/60 hover:bg-white/80 text-[#1C1C1E] shadow-sm'}`}>
                                    <Google size={20} className="opacity-90 group-hover:opacity-100 transition-all duration-300" /> Lanjutkan dengan Google
                                  </button>
                                </>
                              ) : (
                                <button type="button" onClick={() => { setIsLogin(true); setError(''); }} className={`w-full backdrop-blur-md border font-bold py-3.5 rounded-full transition-all ${isDarkMode ? 'bg-white/10 border-white/20 hover:bg-white/20 text-white' : 'bg-white/40 border-white/50 hover:bg-white/60 text-[#1C1C1E] shadow-sm'}`}>
                                  Sudah punya akun? Masuk
                                </button>
                              )}
                              
                              {/* Tombol Tamu dengan Pop-Up "Boleh Kok" (Selalu Tampil) */}
                              <button type="button" onClick={handleAnonAuth} className={`group w-full backdrop-blur-md border font-bold py-3.5 rounded-full transition-all text-[15px] flex justify-center items-center ${isDarkMode ? 'bg-white/5 border-white/10 hover:bg-white/10 text-gray-300 hover:text-white' : 'bg-white/20 border-white/30 hover:bg-white/30 text-[#555] hover:text-[#1C1C1E]'}`}>
                                <span className="relative inline-block">
                                  Coba tanpa login
                                  
                                  {/* Bubble Tooltip - Melekat tepat di kanan teks "n" pada PC */}
                                  <div className={`absolute bottom-[140%] left-1/2 -translate-x-1/2 lg:bottom-auto lg:top-1/2 lg:left-[110%] lg:-translate-y-1/2 lg:translate-x-0 opacity-0 group-hover:opacity-100 transition-all duration-300 font-black px-4 py-2 rounded-xl shadow-xl pointer-events-none scale-90 group-hover:scale-100 z-50 whitespace-nowrap border ${isDarkMode ? 'bg-white text-black border-gray-100' : 'bg-[#1C1C1E] text-white border-[#1C1C1E]'}`}>
                                     Boleh Kok 😉
                                     {/* Panah Bubble */}
                                     <div className={`absolute -bottom-1.5 left-1/2 -translate-x-1/2 lg:-bottom-auto lg:top-1/2 lg:-left-1.5 lg:-translate-y-1/2 lg:translate-x-0 w-3 h-3 transform rotate-45 rounded-sm ${isDarkMode ? 'bg-white' : 'bg-[#1C1C1E]'}`}></div>
                                  </div>
                                </span>
                              </button>

                            </div>
                         </div>
                      </div>

                    </div>
                  </div>
                </div>
              );
            }

            // --- KOMPONEN ONBOARDING (PILIH BUAT ATAU GABUNG TIM) ---
            function OnboardingScreen({ user, onComplete, onLogout }) {
               const [loading, setLoading] = useState(false);
               const [joinCode, setJoinCode] = useState('');
               const [mode, setMode] = useState('select'); // 'select', 'join'

               const generateCompanyId = () => "TIM-" + Math.random().toString(36).substr(2, 6).toUpperCase();

               const handleCreateCompany = async () => {
                  setLoading(true);
                  const newCompanyId = generateCompanyId();
                  try {
                     await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main'), { 
                         companyId: newCompanyId, 
                         role: 'Boss' 
                     });
                     
                     await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `settings_${newCompanyId}`, 'main'), {
                         companyName: 'NAMA PERUSAHAAN',
                         branchName: 'NAMA CABANG',
                         branchAddress: 'Alamat Cabang Perusahaan Anda',
                         username: 'PO',
                         nextNumber: 1,
                         sjUsername: 'SJ',
                         sjNextNumber: 1,
                         invUsername: 'INV',
                         invNextNumber: 1,
                         signatureNamePO: 'Nama Lengkap',
                         signatureNameSJ: 'Nama Lengkap',
                         signatureNameINV: 'Nama Lengkap',
                         paperSizePO: 'Continuous Form',
                         paperSizeSJ: 'Continuous Form',
                         paperSizeINV: 'Continuous Form',
                         webhookUrl: '',
                         requireApproval: true,
                         enablePPN: false
                     });
                     
                     onComplete({ companyId: newCompanyId, role: 'Boss' });
                  } catch(e) {
                     console.error(e);
                     alert("Gagal menginisiasi sistem. Cek koneksi Anda.");
                     setLoading(false);
                  }
               };

               const handleJoinCompany = async (e) => {
                  e.preventDefault();
                  if(!joinCode.trim()) return;
                  setLoading(true);
                  try {
                     const formattedCode = joinCode.trim().toUpperCase();
                     await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main'), { 
                         companyId: formattedCode, 
                         role: 'Staff' 
                     });
                     onComplete({ companyId: formattedCode, role: 'Staff' });
                  } catch(e) {
                     console.error(e);
                     alert("Gagal bergabung. Cek koneksi Anda.");
                     setLoading(false);
                  }
               };

               return (
                <div className="min-h-screen bg-[#F2F2F7] flex flex-col justify-center items-center p-4 font-sans text-[#1C1C1E]">
                  <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-lg p-8 relative border border-[#E5E5EA]">
                    
                    <div className="text-center mb-8">
                      <h2 className="text-2xl font-bold tracking-tight mb-2">Selamat Datang!</h2>
                      <p className="text-[#8E8E93] text-sm">Masuk sebagai: <b>{user.email || 'Akun Tamu'}</b></p>
                    </div>

                    {mode === 'select' && (
                        <div className="space-y-4 mb-8">
                           <button 
                              onClick={handleCreateCompany} 
                              disabled={loading}
                              className="w-full border-2 border-[#007AFF] bg-blue-50/50 hover:bg-blue-50 rounded-[2rem] p-4 flex items-center gap-4 transition-colors text-left"
                            >
                              <div className="bg-[#007AFF] text-white p-3 rounded-full"><Building size={24}/></div>
                              <div>
                                 <div className="font-bold text-[#1C1C1E] text-lg">Setup Sistem Dokumen Baru</div>
                                 <div className="text-sm text-[#8E8E93]">Saya adalah Pengelola / Boss.</div>
                              </div>
                           </button>

                           <button 
                              onClick={() => setMode('join')} 
                              disabled={loading}
                              className="w-full border-2 border-[#34C759] bg-green-50/50 hover:bg-green-50 rounded-[2rem] p-4 flex items-center gap-4 transition-colors text-left"
                            >
                              <div className="bg-[#34C759] text-white p-3 rounded-full"><UserPlus size={24}/></div>
                              <div>
                                 <div className="font-bold text-[#1C1C1E] text-lg">Gabung ke Tim</div>
                                 <div className="text-sm text-[#8E8E93]">Saya memiliki Kode Akses Tim.</div>
                              </div>
                           </button>
                        </div>
                    )}

                    {mode === 'join' && (
                        <form onSubmit={handleJoinCompany} className="mb-8">
                            <p className="text-sm font-medium mb-2 text-center text-[#8E8E93]">Masukkan Kode Akses Tim (Minta ke atasan Anda)</p>
                            <input 
                                type="text" 
                                placeholder="Contoh: TIM-XXXXX" 
                                value={joinCode}
                                onChange={(e) => setJoinCode(e.target.value)}
                                className="w-full bg-[#F2F2F7] border-none rounded-full px-6 py-4 text-center font-bold text-lg tracking-widest uppercase outline-none focus:ring-2 focus:ring-[#34C759] transition-all mb-4"
                                required
                            />
                            <div className="flex gap-2">
                                <button type="button" onClick={() => setMode('select')} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-full transition-colors">Batal</button>
                                <button type="submit" disabled={loading} className="flex-1 bg-[#34C759] hover:bg-[#2DB34A] text-white font-bold py-4 rounded-full transition-colors shadow-sm">Gabung</button>
                            </div>
                        </form>
                    )}

                    <button onClick={onLogout} className="w-full text-[#FF3B30] font-semibold py-2 hover:bg-[#FFE5E5] rounded-full transition-colors">
                      Keluar Akun
                    </button>
                  </div>
                </div>
               );
            }

            // --- MAIN APP COMPONENT ---
            function App() {
              const [user, setUser] = useState(null);
              const [userProfile, setUserProfile] = useState(null); 
              const [isLoadingAuth, setIsLoadingAuth] = useState(true);
              
              // App Modes: 'PO' (Purchase Order), 'SJ' (Surat Jalan), 'INV' (Invoice)
              const [appMode, setAppMode] = useState('PO');
              const [activeTab, setActiveTab] = useState('create');
              const [editingDoc, setEditingDoc] = useState(null);
              
              const [settings, setSettings] = useState({
                companyName: 'NAMA PERUSAHAAN', branchName: 'CABANG', branchAddress: '', 
                username: 'PO', nextNumber: 1, sjUsername: 'SJ', sjNextNumber: 1, invUsername: 'INV', invNextNumber: 1,
                signatureNamePO: 'Nama Lengkap', signatureNameSJ: 'Nama Lengkap', signatureNameINV: 'Nama Lengkap', 
                paperSizePO: 'Continuous Form', paperSizeSJ: 'Continuous Form', paperSizeINV: 'Continuous Form',
                webhookUrl: '', requireApproval: true, enablePPN: false
              });
              
              const [suppliers, setSuppliers] = useState([]);
              const [customers, setCustomers] = useState([]);
              const [pos, setPos] = useState([]);
              const [sjs, setSjs] = useState([]);
              const [invs, setInvs] = useState([]);

              useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                  setUser(u);
                  if(!u) setIsLoadingAuth(false);
                });
                return () => unsubscribe();
              }, []);

              useEffect(() => {
                if (!user) return;

                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
                const unsubProfile = onSnapshot(profileRef, (snap) => {
                  if (snap.exists() && snap.data().companyId) {
                    setUserProfile({
                        companyId: snap.data().companyId,
                        role: snap.data().role
                    });
                  } else {
                    setUserProfile('UNASSIGNED');
                  }
                  setIsLoadingAuth(false);
                }, console.error);

                return () => unsubProfile();
              }, [user]);

              useEffect(() => {
                if (!userProfile || userProfile === 'UNASSIGNED') return;

                const companyId = userProfile.companyId;

                const setRef = doc(db, 'artifacts', appId, 'public', 'data', `settings_${companyId}`, 'main');
                const unsubSet = onSnapshot(setRef, (snap) => {
                  if (snap.exists()) setSettings(snap.data());
                }, console.error);

                const supRef = collection(db, 'artifacts', appId, 'public', 'data', `suppliers_${companyId}`);
                const unsubSup = onSnapshot(supRef, (snap) => {
                  setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, console.error);
                
                const custRef = collection(db, 'artifacts', appId, 'public', 'data', `customers_${companyId}`);
                const unsubCust = onSnapshot(custRef, (snap) => {
                  setCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, console.error);

                const posRef = collection(db, 'artifacts', appId, 'public', 'data', `pos_${companyId}`);
                const unsubPos = onSnapshot(posRef, (snap) => {
                  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                  setPos(data.sort((a,b) => new Date(b.date) - new Date(a.date))); 
                }, console.error);
                
                const sjsRef = collection(db, 'artifacts', appId, 'public', 'data', `sjs_${companyId}`);
                const unsubSjs = onSnapshot(sjsRef, (snap) => {
                  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                  setSjs(data.sort((a,b) => new Date(b.date) - new Date(a.date))); 
                }, console.error);
                
                const invsRef = collection(db, 'artifacts', appId, 'public', 'data', `invs_${companyId}`);
                const unsubInvs = onSnapshot(invsRef, (snap) => {
                  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                  setInvs(data.sort((a,b) => new Date(b.date) - new Date(a.date))); 
                }, console.error);

                return () => { unsubSet(); unsubSup(); unsubCust(); unsubPos(); unsubSjs(); unsubInvs(); };
              }, [userProfile]);

              const handleLogout = async () => {
                 if(confirm("Apakah Anda yakin ingin keluar?")) {
                    await signOut(auth);
                    setUserProfile(null);
                 }
              };

              const handleOnboardingLogout = async () => {
                 await signOut(auth);
                 setUserProfile(null);
                 setUser(null); // Langsung kembalikan ke Beranda/Login secara instan
              };

              if (isLoadingAuth || (user && !userProfile)) {
                  return <div className="h-screen w-full flex flex-col items-center justify-center bg-[#F2F2F7] text-[#8E8E93]"><Loader size={40} className="mb-4 text-[#007AFF]"/>Memuat Sistem...</div>;
              }

              if (!user) return <AuthScreen />;

              if (userProfile === 'UNASSIGNED') {
                 return <OnboardingScreen user={user} onComplete={setUserProfile} onLogout={handleOnboardingLogout} />;
              }

              const { companyId, role: userRole } = userProfile;

              const generateDocNumber = (num, mode) => {
                const date = new Date();
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                let prefix = settings.username || 'PO';
                if (mode === 'SJ') prefix = settings.sjUsername || 'SJ';
                if (mode === 'INV') prefix = settings.invUsername || 'INV';
                return `${prefix}/${year}/${month}/${String(num).padStart(3, '0')}`;
              };

              const syncToSpreadsheet = async (docData, mode) => {
                 if (!settings.webhookUrl || settings.webhookUrl.trim() === '') return;
                 try {
                     const payload = { ...docData, documentType: mode };
                     await fetch(settings.webhookUrl, {
                         method: 'POST',
                         mode: 'no-cors',
                         headers: { 'Content-Type': 'application/json' },
                         body: JSON.stringify(payload)
                     });
                 } catch(e) { console.error("Gagal sync Webhook:", e); }
              };

              const onSaveDoc = async (docData, isUpdate, mode) => {
                try {
                  let collectionName = `pos_${companyId}`;
                  if (mode === 'SJ') collectionName = `sjs_${companyId}`;
                  if (mode === 'INV') collectionName = `invs_${companyId}`;
                  
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, docData.id), docData);
                  
                  if (!isUpdate) {
                    const newSettings = { ...settings };
                    if (mode === 'PO') newSettings.nextNumber = (settings.nextNumber || 1) + 1;
                    if (mode === 'SJ') newSettings.sjNextNumber = (settings.sjNextNumber || 1) + 1;
                    if (mode === 'INV') newSettings.invNextNumber = (settings.invNextNumber || 1) + 1;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `settings_${companyId}`, 'main'), newSettings);
                  }
                  
                  syncToSpreadsheet(docData, mode);
                  alert(isUpdate ? "Dokumen Berhasil Diperbarui!" : "Dokumen Berhasil Disimpan!");
                } catch(e) { console.error(e); alert("Terjadi kesalahan saat menyimpan dokumen."); }
              };

              const onUpdateStatusDoc = async (id, status, mode) => {
                 if (userRole !== 'Boss') return alert("Akses Ditolak: Hanya atasan yang dapat mengubah status.");
                 try {
                   let collectionName = `pos_${companyId}`;
                   let sourceArray = pos;
                   if (mode === 'SJ') { collectionName = `sjs_${companyId}`; sourceArray = sjs; }
                   if (mode === 'INV') { collectionName = `invs_${companyId}`; sourceArray = invs; }
                   
                   const docToUpdate = sourceArray.find(p => p.id === id);
                   
                   if (docToUpdate) {
                      const updatedDoc = { ...docToUpdate, status };
                      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id), updatedDoc);
                      syncToSpreadsheet(updatedDoc, mode);
                   }
                 } catch(err) { console.error(err); alert("Gagal update status: " + err.message); }
              };

              const onAddPartner = async (newPartner, mode) => {
                 try {
                     const collectionName = mode === 'PO' ? `suppliers_${companyId}` : `customers_${companyId}`;
                     const cleanPartner = Object.fromEntries(Object.entries(newPartner).filter(([_, v]) => v !== undefined));
                     await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, newPartner.id.toString()), cleanPartner);
                 } catch(err) { console.error("Gagal tambah partner:", err); alert("Gagal menambahkan data: " + err.message); }
              };

              const onEditPartner = async (updatedPartner, mode) => {
                 try {
                     const collectionName = mode === 'PO' ? `suppliers_${companyId}` : `customers_${companyId}`;
                     const cleanPartner = Object.fromEntries(Object.entries(updatedPartner).filter(([_, v]) => v !== undefined));
                     await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, updatedPartner.id.toString()), cleanPartner);
                 } catch(err) { console.error("Gagal edit partner:", err); alert("Gagal mengedit data: " + err.message); }
              };

              const onDeletePartner = async (id, mode) => {
                 try {
                     const collectionName = mode === 'PO' ? `suppliers_${companyId}` : `customers_${companyId}`;
                     await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id.toString()));
                 } catch(err) { console.error("Gagal hapus partner:", err); alert("Gagal menghapus data: " + err.message); }
              };

              const onSaveSettings = async (newSettings) => {
                 if (userRole !== 'Boss') return;
                 try {
                     const cleanSettings = Object.fromEntries(Object.entries(newSettings).filter(([_, v]) => v !== undefined));
                     await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `settings_${companyId}`, 'main'), cleanSettings);
                 } catch(err) { console.error("Gagal simpan setting:", err); alert("Gagal menyimpan pengaturan: " + err.message); }
              };

              return (
                <div className="min-h-screen bg-[#F2F2F7] flex flex-col text-[#1C1C1E] antialiased" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif' }}>
                  <style>{`
                    @page { margin: 0; }
                    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                    input, textarea, select { -webkit-user-select: auto !important; -moz-user-select: auto !important; -ms-user-select: auto !important; user-select: auto !important; }
                    input[type=number] { -moz-appearance: textfield; }

                    /* Simulasi aturan Print Media saat proses Export PDF */
                    .generating-pdf .print\\:hidden { display: none !important; }
                    .generating-pdf .print\\:block { display: block !important; }
                    .generating-pdf .hidden.print\\:block { display: block !important; }
                    .generating-pdf .print\\:border-none { border: none !important; }
                    .generating-pdf .print\\:p-0 { padding: 0 !important; }
                    .generating-pdf .print\\:shadow-none { box-shadow: none !important; }
                    .generating-pdf .print\\:rounded-none { border-radius: 0 !important; }
                    .generating-pdf .print\\:resize-none { resize: none !important; }
                    .generating-pdf .print\\:w-auto { width: auto !important; }
                  `}</style>

                  <nav className="bg-white/90 backdrop-blur-md shadow-sm border-b border-gray-200 print:hidden z-10 sticky top-0">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                      <div className="flex justify-between items-center h-16">
                        <div className="flex items-center gap-3">
                          <span className="font-bold text-gray-800 tracking-tight text-xl hidden sm:block">Sistem</span>
                          
                          {/* Mode Switcher */}
                          <div className="bg-[#F2F2F7] p-1 rounded-full flex text-xs font-bold ml-2 shadow-inner">
                            <button 
                              onClick={() => { setAppMode('PO'); setEditingDoc(null); setActiveTab('create'); }} 
                              className={`px-4 py-1.5 rounded-full transition-all ${appMode === 'PO' ? 'bg-white shadow-[0_1px_3px_rgba(0,0,0,0.1)] text-[#007AFF]' : 'text-[#8E8E93] hover:text-[#1C1C1E]'}`}
                            >
                              PO
                            </button>
                            <button 
                              onClick={() => { setAppMode('SJ'); setEditingDoc(null); setActiveTab('create'); }} 
                              className={`px-4 py-1.5 rounded-full transition-all ${appMode === 'SJ' ? 'bg-white shadow-[0_1px_3px_rgba(0,0,0,0.1)] text-[#FF9500]' : 'text-[#8E8E93] hover:text-[#1C1C1E]'}`}
                            >
                              SJ
                            </button>
                            <button 
                              onClick={() => { setAppMode('INV'); setEditingDoc(null); setActiveTab('create'); }} 
                              className={`px-4 py-1.5 rounded-full transition-all ${appMode === 'INV' ? 'bg-white shadow-[0_1px_3px_rgba(0,0,0,0.1)] text-[#34C759]' : 'text-[#8E8E93] hover:text-[#1C1C1E]'}`}
                            >
                              Invoice
                            </button>
                          </div>

                          <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider hidden md:inline-block ml-2 ${userRole === 'Boss' ? 'bg-[#007AFF]/10 text-[#007AFF]' : 'bg-[#34C759]/10 text-[#34C759]'}`}>
                             {userRole}
                          </span>
                        </div>
                        
                        <div className="flex gap-2 sm:gap-6 overflow-x-auto hide-scrollbar h-full items-end">
                          <NavButton active={activeTab === 'create'} onClick={() => { setActiveTab('create'); setEditingDoc(null); }} icon={<FileText size={16} />} label={`Buat ${appMode}`} />
                          <NavButton active={activeTab === 'approve'} onClick={() => setActiveTab('approve')} icon={<ClipboardList size={16} />} label={`Daftar ${appMode}`} badge={settings.requireApproval !== false ? (appMode === 'PO' ? pos : appMode === 'SJ' ? sjs : invs).filter(p => p.status === 'Pending').length : 0} />
                          <NavButton active={activeTab === 'partners'} onClick={() => setActiveTab('partners')} icon={<Users size={16} />} label={appMode === 'PO' ? 'Supplier' : 'Customer'} />
                          <NavButton active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon={<Settings size={16} />} label={userRole === 'Boss' ? "Pengaturan" : "Profil"} />
                        </div>
                      </div>
                    </div>
                  </nav>

                  <main className="flex-1 overflow-auto p-4 sm:p-6 lg:p-8 print:p-0 print:bg-white pb-32">
                    {activeTab === 'create' && (
                      <CreateDocView 
                        appMode={appMode}
                        partners={appMode === 'PO' ? suppliers : customers} 
                        settings={settings} setSettings={setSettings} 
                        editingDoc={editingDoc} setEditingDoc={setEditingDoc} 
                        onSaveDoc={onSaveDoc} generateDocNumber={generateDocNumber} userRole={userRole}
                      />
                    )}
                    {activeTab === 'approve' && (
                      <DocListView 
                        appMode={appMode}
                        docs={appMode === 'PO' ? pos : appMode === 'SJ' ? sjs : invs} 
                        onLoadDoc={(doc) => { setEditingDoc(doc); setActiveTab('create'); }} 
                        onUpdateStatus={onUpdateStatusDoc} userRole={userRole} settings={settings}
                      />
                    )}
                    {activeTab === 'partners' && (
                      <PartnerView 
                        appMode={appMode}
                        partners={appMode === 'PO' ? suppliers : customers} 
                        docs={appMode === 'PO' ? pos : appMode === 'SJ' ? sjs : invs} 
                        onAddPartner={onAddPartner} onEditPartner={onEditPartner} onDeletePartner={onDeletePartner} settings={settings}
                      />
                    )}
                    {activeTab === 'settings' && (
                      <SettingsView settings={settings} onSaveSettings={onSaveSettings} user={user} userRole={userRole} companyId={companyId} onLogout={handleLogout} />
                    )}
                  </main>
                </div>
              );
            }

            function NavButton({ active, onClick, icon, label, badge }) {
              return (
                <button
                  onClick={onClick}
                  className={`
                    ${active ? 'text-[#007AFF] font-bold border-[#007AFF]' : 'text-[#8E8E93] hover:text-[#1C1C1E] border-transparent font-medium'}
                    flex items-center justify-center py-4 text-[14px] border-b-[3px] transition-colors gap-1.5 relative whitespace-nowrap
                  `}
                >
                  {icon}
                  {label}
                  {badge > 0 && (
                    <span className="absolute top-2 -right-3 bg-[#FF3B30] text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">
                      {badge}
                    </span>
                  )}
                </button>
              );
            }

            // --- 1. CREATE DOC VIEW ---
            function CreateDocView({ appMode, partners, settings, setSettings, editingDoc, setEditingDoc, onSaveDoc, generateDocNumber, userRole }) {
              const defaultItems = [{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }];
              const [partnerId, setPartnerId] = useState('');
              const [items, setItems] = useState(defaultItems);
              const [date, setDate] = useState(new Date());
              const [note, setNote] = useState('');
              const [isPartnerDropdownOpen, setIsPartnerDropdownOpen] = useState(false);
              const [partnerSearch, setPartnerSearch] = useState('');
              const [discountModalId, setDiscountModalId] = useState(null);
              const [tempDiscounts, setTempDiscounts] = useState(['', '', '', '']);

              let docTitle = 'Purchase Order';
              let docLabel = 'PO';
              let partnerLabel = 'Vendor';
              
              if (appMode === 'SJ') { docTitle = 'Surat Jalan'; docLabel = 'SJ'; partnerLabel = 'Customer'; }
              if (appMode === 'INV') { docTitle = 'Invoice'; docLabel = 'INV'; partnerLabel = 'Customer'; }

              const selectedPartner = partners.find(s => s.id === partnerId) || {};
              
              let currentNextNumber = settings.nextNumber || 1;
              if (appMode === 'SJ') currentNextNumber = settings.sjNextNumber || 1;
              if (appMode === 'INV') currentNextNumber = settings.invNextNumber || 1;
              
              const currentDocNumber = generateDocNumber(currentNextNumber, appMode);
              const isApproved = editingDoc && editingDoc.status === 'Approved';

              const currentSignatureKey = appMode === 'PO' ? 'signatureNamePO' : appMode === 'SJ' ? 'signatureNameSJ' : 'signatureNameINV';
              const currentSignature = settings[currentSignatureKey] !== undefined ? settings[currentSignatureKey] : (settings.signatureName || '');

              const currentPaperSizeKey = appMode === 'PO' ? 'paperSizePO' : appMode === 'SJ' ? 'paperSizeSJ' : 'paperSizeINV';
              const currentPaperSize = settings[currentPaperSizeKey] || 'Continuous Form';
              
              // Ukuran statis untuk layar monitor & PDF
              const paperStyles = currentPaperSize === 'A4' 
                ? { width: '210mm', minHeight: '297mm' }
                : { width: '9.5in', minHeight: '5.5in' }; 

              const formatCurrency = (num) => new Intl.NumberFormat('id-ID').format(num || 0);
              const formatDate = (date) => date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

              const handleAddItem = () => setItems([...items, { id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
              const handleRemoveItem = (id) => setItems(items.filter(item => item.id !== id));
              const handleItemChange = (id, field, value) => setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));

              const calculateNetPrice = (price, discounts) => {
                if (!discounts || discounts.length === 0) return price;
                return discounts.reduce((acc, d) => acc - (acc * (d / 100)), price);
              };

              const openDiscountModal = (item) => {
                setDiscountModalId(item.id);
                const d = item.discounts || [];
                setTempDiscounts([
                  d[0] !== undefined ? String(d[0]) : '', d[1] !== undefined ? String(d[1]) : '', 
                  d[2] !== undefined ? String(d[2]) : '', d[3] !== undefined ? String(d[3]) : ''
                ]);
              };

              const handleDiscountChange = (index, val) => {
                const newD = [...tempDiscounts];
                newD[index] = val;
                setTempDiscounts(newD);
              };

              const saveDiscounts = () => {
                setItems(prevItems => prevItems.map(item => {
                  if (item.id === discountModalId) {
                    const activeDiscounts = tempDiscounts.map(Number).filter(d => d > 0 && !isNaN(d));
                    const net = calculateNetPrice(item.price, activeDiscounts);
                    return { ...item, price: net, discounts: [] }; 
                  }
                  return item;
                }));
                setDiscountModalId(null);
              };

              useEffect(() => {
                if (editingDoc) {
                  setPartnerId(editingDoc.vendor.id); 
                  setItems(editingDoc.items);
                  setDate(new Date(editingDoc.date));
                  setNote(editingDoc.note || '');
                } else {
                  setPartnerId(partners.length > 0 ? partners[0].id : '');
                  setItems([{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
                  setDate(new Date());
                  setNote('');
                }
              }, [editingDoc, partners, appMode]);

              const total = items.reduce((sum, item) => sum + (item.qty * calculateNetPrice(item.price, item.discounts)), 0);
              const isFormValid = partnerId && items.length > 0 && items.every(i => i.desc.trim() !== '' && i.qty > 0);

              const handleSave = () => {
                if (!isFormValid) return;
                const docData = {
                  id: editingDoc ? editingDoc.id : Date.now().toString(),
                  poNumber: editingDoc ? editingDoc.poNumber : currentDocNumber, 
                  date: date.toISOString(), 
                  vendor: selectedPartner, 
                  items: items, 
                  total: appMode === 'SJ' ? 0 : total, 
                  note: note,
                  status: editingDoc ? editingDoc.status : (settings.requireApproval !== false ? 'Pending' : 'Approved'),
                  createdByRole: userRole
                };
                onSaveDoc(docData, !!editingDoc, appMode);
                setEditingDoc(null);
                setPartnerId('');
                setItems([{ id: Date.now(), desc: '', qty: 1, unit: 'PCS', price: 0, discounts: [] }]);
                setNote('');
                setDate(new Date());
              };

              const handleSavePdf = async () => {
                  if (!isApproved) {
                      alert(`Simpan PDF hanya tersedia untuk ${docLabel} yang sudah tersimpan dan disetujui. Silakan buka dari tab Daftar.`);
                      return;
                  }
                  const element = document.getElementById('printable-canvas');
                  
                  // Tambahkan class untuk style khusus render PDF
                  element.classList.add('generating-pdf');
                  
                  const filename = `${editingDoc ? editingDoc.poNumber : currentDocNumber}.pdf`.replace(/\//g, '-');
                  
                  // PERBAIKAN: Set orientasi landscape agar jsPDF tidak memutar 9.5x5.5 menjadi terbalik.
                  const pdfFormat = currentPaperSize === 'A4' ? 'a4' : [9.5, 5.5];
                  const pdfOrientation = currentPaperSize === 'A4' ? 'portrait' : 'landscape';

                  const opt = {
                    margin:       0.15,
                    filename:     filename,
                    image:        { type: 'jpeg', quality: 1 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF:        { unit: currentPaperSize === 'A4' ? 'mm' : 'in', format: pdfFormat, orientation: pdfOrientation }
                  };
                  
                  try {
                      await html2pdf().set(opt).from(element).save();
                  } finally {
                      // Bersihkan style generator ketika selesai diunduh
                      element.classList.remove('generating-pdf');
                  }
              };

              return (
                <div className="max-w-5xl mx-auto flex flex-col gap-6 relative print:w-full print:max-w-full print:m-0 print:p-0">
                  <div className="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 z-50 print:hidden">
                    <button onClick={handleSavePdf} disabled={!isApproved} className={`flex items-center justify-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-lg ${isApproved ? 'bg-white border border-[#D1D1D6] hover:bg-[#F2F2F7] text-[#1C1C1E]' : 'bg-gray-200 text-gray-400 border border-gray-300 cursor-not-allowed'}`}><FileDown size={18} /> PDF</button>
                    <button onClick={(e) => { if (!isApproved) { e.preventDefault(); alert(`Cetak hanya tersedia untuk ${docLabel} yang sudah tersimpan dan disetujui. Silakan buka dari tab Daftar.`); return; } window.print(); }} className={`flex items-center justify-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-lg ${isApproved ? 'bg-white border border-[#D1D1D6] hover:bg-[#F2F2F7] text-[#1C1C1E]' : 'bg-gray-200 text-gray-400 border border-gray-300 cursor-not-allowed'}`}><Printer size={18} /> Cetak</button>
                    <button onClick={handleSave} disabled={!isFormValid} className={`flex items-center justify-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-lg ${isFormValid ? (appMode === 'PO' ? 'bg-[#007AFF] hover:bg-[#0056b3]' : appMode === 'SJ' ? 'bg-[#FF9500] hover:bg-[#E08300]' : 'bg-[#34C759] hover:bg-[#2DB34A]') + ' text-white cursor-pointer' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}><Save size={18} /> Simpan</button>
                  </div>

                  {/* --- SOLUSI EXCEL TRICK KHUSUS DOT MATRIX --- */}
                  <style>{`
                    /* Saat membuat PDF, paksa ukuran tetap agar gambar tangkapan layar akurat */
                    .generating-pdf #printable-canvas {
                       width: ${currentPaperSize === 'A4' ? '210mm' : '9.5in'} !important;
                       min-height: ${currentPaperSize === 'A4' ? '297mm' : '5.5in'} !important;
                    }

                    @media print { 
                      @page { 
                        /* Tidak mendefinisikan 'size' agar System Dialog Windows yang mengontrol orientasi kertas */
                        margin: 0 !important; 
                      } 
                      body, html, #root { 
                        -webkit-print-color-adjust: exact; 
                        print-color-adjust: exact; 
                        margin: 0 !important;
                        padding: 0 !important;
                        background: white !important;
                      }
                      
                      /* EXCEL TRICK: Timpa ukuran inci statis (9.5in) dengan lebar 100% dinamis.
                         Ini mencegah Browser (Chrome/Edge) menyusutkan gambar ke 70% karena mengira
                         dokumen melebihi batas area cetak driver printer. */
                      #printable-canvas { 
                        display: block !important;
                        width: 100% !important; 
                        max-width: 100% !important;
                        min-height: auto !important; 
                        margin: 0 !important;
                        padding: 0.15in 0.2in !important; /* Margin fisik aman dari gigi traktor Dot Matrix */
                        box-shadow: none !important;
                        zoom: 1 !important;
                        transform: scale(1) !important;
                      }
                      
                      /* Memaksa ukuran font menggunakan Poin (pt) untuk resolusi tinta pita Dot Matrix */
                      * {
                        font-family: Arial, sans-serif !important;
                        color: #000 !important;
                      }
                      .text-sm { font-size: 11pt !important; line-height: 1.3 !important; }
                      .text-base { font-size: 12pt !important; line-height: 1.3 !important; }
                      .text-lg { font-size: 14pt !important; line-height: 1.3 !important; }
                      .text-xl { font-size: 16pt !important; font-weight: bold !important; }
                      .text-\\[1\\.925rem\\] { 
                        font-size: 22pt !important; 
                        font-weight: bold !important;
                        transform: none !important; /* Matikan efek animasi web */
                      }
                      input, textarea {
                        background: transparent !important;
                        border: none !important;
                      }
                    }
                  `}</style>

                  {/* Kertas Dokumen */}
                  <div id="printable-canvas" className="bg-white p-6 shadow-md print:shadow-none print:p-0 h-auto flex flex-col mx-auto relative overflow-hidden text-black font-sans box-border transition-all duration-300" style={{ ...paperStyles, fontFamily: 'Arial, sans-serif' }}>
                    <div className="flex justify-between items-start mb-6">
                      <div>
                        <h1 className="text-[1.925rem] uppercase tracking-tight leading-none inline-block origin-top-left" style={{ fontFamily: 'Arial, sans-serif', fontWeight: '800', transform: 'scaleY(1.1)', transformOrigin: 'left top' }}>
                          {settings.companyName || 'NAMA PERUSAHAAN'}
                        </h1>
                      </div>
                      <div className="text-right flex flex-col items-end">
                        <h2 className="text-xl font-bold uppercase tracking-wider mb-1">{docTitle}</h2>
                        <div className="text-sm mb-2">{formatDate(date)}</div>
                        <table className="text-sm">
                          <tbody>
                            <tr><td className="pr-4 py-0.5 text-left">{docLabel}</td><td className="pr-2 py-0.5">:</td><td className="text-left font-medium">{editingDoc ? editingDoc.poNumber : currentDocNumber}</td></tr>
                            {appMode !== 'SJ' && <tr><td className="pr-4 py-0.5 text-left">Payment</td><td className="pr-2 py-0.5">:</td><td className="text-left">{selectedPartner.payment || '-'}</td></tr>}
                            {appMode !== 'SJ' && settings.enablePPN !== false && <tr><td className="pr-4 py-0.5 text-left">PPN</td><td className="pr-2 py-0.5">:</td><td className="text-left">{selectedPartner.ppn || '-'}</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
