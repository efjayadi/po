                                  <button onClick={handleCopyId} className="bg-white border border-[#D1D1D6] text-[#1C1C1E] font-semibold py-3 px-6 rounded-xl hover:bg-[#F2F2F7] transition-colors whitespace-nowrap">Salin Kode</button>
                              </div>
                              <p className="text-xs text-[#8E8E93] mt-3">
                                *Berikan kode di atas kepada Staff Anda. Saat Staff login dan memilih "Gabung Perusahaan", mereka harus memasukkan kode ini agar dapat bekerja di data perusahaan Anda.
                              </p>
                            </div>
                        )}
                      </div>
                    </div>

                    {/* BLOK PENGATURAN BERIKUT HANYA BISA DILIHAT OLEH BOSS */}
                    {userRole === 'Boss' && (
                      <>
                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-2 ml-4">Identitas Pembeli</h3>
                          <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-4 border-b border-[#F2F2F7]"><div className="w-1/3 text-[15px] font-medium text-[#1C1C1E]">Nama Utama</div><div className="w-2/3"><input type="text" value={localSettings.companyName || ''} onChange={(e) => setLocalSettings({...localSettings, companyName: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-medium bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-4 border-b border-[#F2F2F7]"><div className="w-1/3 text-[15px] font-medium text-[#1C1C1E]">Nama Penerima</div><div className="w-2/3"><input type="text" value={localSettings.branchName || ''} onChange={(e) => setLocalSettings({...localSettings, branchName: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                            <div className="flex items-start justify-between p-4"><div className="w-1/3 text-[15px] font-medium text-[#1C1C1E]">Alamat</div><div className="w-2/3"><textarea rows="2" value={localSettings.branchAddress || ''} onChange={(e) => setLocalSettings({...localSettings, branchAddress: e.target.value})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent resize-none"/></div></div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-2 ml-4">Konfigurasi Nomor PO</h3>
                          <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-4 border-b border-[#F2F2F7]"><div className="w-1/2 text-[15px] font-medium text-[#1C1C1E]">Prefix PO</div><div className="w-1/2"><input type="text" value={localSettings.username || ''} onChange={(e) => setLocalSettings({...localSettings, username: e.target.value.toUpperCase()})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent"/></div></div>
                            <div className="flex items-center justify-between p-4"><div className="w-1/2 text-[15px] font-medium text-[#1C1C1E]">Nomor Selanjutnya</div><div className="w-1/2"><input type="number" value={localSettings.nextNumber || 1} onChange={(e) => setLocalSettings({...localSettings, nextNumber: Number(e.target.value)})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] font-mono bg-transparent" min="1"/></div></div>
                          </div>
                          <p className="text-xs text-[#8E8E93] mt-2 ml-4">Contoh: {localSettings.username || 'PO'}/{new Date().getFullYear()}/{String(new Date().getMonth() + 1).padStart(2, '0')}/...</p>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-2 ml-4">Dokumen</h3>
                          <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex items-center justify-between p-4"><div className="w-1/2 text-[15px] font-medium text-[#1C1C1E]">Penandatangan</div><div className="w-1/2"><input type="text" value={localSettings.signatureName || ''} onChange={(e) => setLocalSettings({...localSettings, signatureName: e.target.value})} onFocus={(e) => e.target.select()} className="w-full text-right outline-none text-[15px] text-[#8E8E93] bg-transparent"/></div></div>
                          </div>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-[#8E8E93] uppercase tracking-wider mb-2 ml-4">Integrasi Spreadsheet</h3>
                          <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E5E5EA]">
                            <div className="flex flex-col p-4">
                              <div className="text-[15px] font-medium text-[#1C1C1E] mb-2">Google Apps Script Webhook URL</div>
                              <input type="text" value={localSettings.webhookUrl || ''} onChange={(e) => setLocalSettings({...localSettings, webhookUrl: e.target.value})} onFocus={(e) => e.target.select()} placeholder="https://script.google.com/macros/s/.../exec" className="w-full text-left outline-none text-[15px] text-[#007AFF] bg-[#F2F2F7] p-3 rounded-xl border-none"/>
                              <p className="text-xs text-[#8E8E93] mt-3">*Aplikasi akan mengirimkan data PO (JSON) ke URL di atas saat simpan. Kosongkan jika tidak menggunakan Spreadsheet.</p>
                            </div>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        // Render
        if (window.firebaseAPI) { renderApp(); } else { window.addEventListener('firebaseLoaded', renderApp); }
    </script>
</body>
</html>
